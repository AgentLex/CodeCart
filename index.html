<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCart v1.1.8 - True Bilingual & Robust</title>
    <style>
        :root {
            --bg-app: #f4f4f5; --bg-card: #ffffff; --bg-sidebar: #fafafa;
            --accent: #2563eb; --accent-dim: #dbeafe; --border: #e4e4e7;
            --text-primary: #18181b; --text-secondary: #71717a; --danger: #dc2626;
        }
        body.dark-mode {
            --bg-app: #09090b; --bg-card: #18181b; --bg-sidebar: #09090b;
            --accent: #3b82f6; --accent-dim: #1d4ed833; --border: #27272a;
            --text-primary: #fafafa; --text-secondary: #a1a1aa; --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Inter", -apple-system, sans-serif; background: var(--bg-app); color: var(--text-primary); overflow: hidden; transition: 0.3s; }

        header { height: 52px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg-sidebar); z-index: 100; }
        .token-stat { font-family: "JetBrains Mono", monospace; color: var(--accent); font-weight: 700; font-size: 13px; }
        
        .layout { display: flex; height: calc(100% - 252px); }
        aside { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-sidebar); }
        .side-tool { margin: 15px; padding: 16px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }

        main { flex: 1; overflow-y: auto; padding: 32px; }
        #canvas { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; align-content: start; }
        .empty-state { grid-column: 1 / -1; min-height: 320px; display:flex; align-items:center; justify-content:center; }
        .empty-card { max-width: 460px; text-align:center; background: var(--bg-card); border:1px dashed var(--border); border-radius: 16px; padding: 36px 24px; }
        .empty-icon { font-size: 42px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }

        .node { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; transition: 0.3s; border-top: 1px solid var(--border); }
        .node:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.2); }
        .node.anchor { border-top: 4px solid var(--accent); }
        .node.superseded { opacity: 0.2; filter: grayscale(1); }
        .node-id { font-family: "JetBrains Mono"; font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        
        .del-btn { position: absolute; top: 12px; right: 12px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; color: var(--text-secondary); opacity: 0; }
        .node:hover .del-btn { opacity: 1; }
        .del-btn:hover { background: var(--danger); color: #fff; }

        footer { height: 200px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px; gap: 8px; }
        .console-container { flex: 1; display: flex; gap: 12px; }
        textarea { flex: 1; background: var(--bg-app); border: 1px solid var(--border); border-radius: 12px; padding: 16px; color: var(--text-primary); font-family: "JetBrains Mono", monospace; font-size: 13px; outline: none; }

        button { padding: 10px 16px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: var(--border); color: var(--text-secondary); }

        #modal-overlay, #guide-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: var(--bg-card); padding: 32px; border-radius: 20px; width: 420px; border: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body class="dark-mode">

<header>
    <div><strong id="ui-title">CODECART v1.1.8</strong></div>
    <div style="display:flex; gap:12px; align-items:center;">
        <div class="token-stat" id="token-display">TOKEN 已节约: 0</div>
        <button class="btn-secondary" onclick="store.toggleLang()" id="btn-lang">EN/ZH</button>
        <button class="btn-secondary" onclick="store.toggleTheme()" id="btn-theme">🌓 THEME</button>
        <button class="btn-primary" style="background:#f59e0b;" onclick="store.startGuide()" id="btn-guide-start">🐣 小白指引</button>
        <button class="btn-secondary" onclick="store.toggleHelp()">?</button>
    </div>
</header>

<div class="layout">
    <aside>
        <div class="side-tool">
            <small id="ui-helper-title" style="color:var(--accent); font-weight:bold;">AI 调教助手</small>
            <p id="ui-helper-desc" style="font-size:10px; color:var(--text-secondary); margin:8px 0;">生成一段话发给 AI，让它直接输出 CodeCart 格式。</p>
            <button class="btn-secondary" id="btn-copy-prompt" style="width:100%; font-size:10px;" onclick="store.copyAIPrompt()">复制调教语</button>
        </div>
        <div id="entity-index" style="flex:1; overflow-y:auto; padding:12px;"></div>
        <div style="padding: 20px;">
            <button class="btn-primary" onclick="store.copyContext()" style="width: 100%;" id="btn-copy-ctx">📋 复制上下文</button>
        </div>
    </aside>
    <main><div id="canvas"></div></main>
</div>

<footer>
    <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn-secondary" onclick="store.insertCmd('+CLAIM(ID, \'\')')" id="btn-add-claim">+结论</button>
        <button class="btn-secondary" onclick="store.insertCmd('>SUPERSEDE(OLD, NEW, \'\')')" id="btn-add-supersede">>替代</button>
        <button class="btn-secondary" onclick="store.insertCmd('+ANCHOR(\'\')')" id="btn-add-anchor">+锚点</button>
        <small id="ui-id-tip" style="font-size:10px; color:var(--text-secondary); margin-left:10px;">建议 ID: phy_ (物理), hw_ (硬件)</small>
    </div>
    <div class="console-container">
        <textarea id="console-input" placeholder="贴入 DSL 指令或 AI 原始对话文本..."></textarea>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn-primary" onclick="store.execute()" id="btn-exec">⚡ 执行指令</button>
            <button class="btn-secondary" style="color:#f472b6;" onclick="store.smartCollapse()" id="btn-smart">🧠 智能坍缩</button>
            <button class="btn-secondary" onclick="store.exportJSON()" id="btn-save">SAVE</button>
        </div>
    </div>
</footer>

<!-- Help Modal -->
<div id="modal-overlay">
    <div class="modal-card">
        <h3 id="ui-help-title">指令速查表</h3>
        <div id="ui-help-content" style="font-size:12px; line-height:1.8;"></div>
        <button class="btn-primary" onclick="store.toggleHelp()" id="btn-help-close" style="width:100%; margin-top:20px;">关闭</button>
    </div>
</div>

<!-- Step Guide -->
<div id="guide-overlay" onclick="store.nextStep()">
    <div class="modal-card" style="width:500px;">
        <div id="step-1" class="guide-step" style="display:none;">
            <h4 id="ui-g1-t">第一步：设置锚点</h4>
            <p id="ui-g1-d">点击下方的 +锚点，输入项目的底线（如：必须手持）。</p>
            <small style="color:var(--accent);">CLICK TO NEXT...</small>
        </div>
        <div id="step-2" class="guide-step" style="display:none;">
            <h4 id="ui-g2-t">第二步：同步背景</h4>
            <p id="ui-g2-d">点击左侧蓝色的 复制上下文。这会让 AI 明白当前的逻辑进展。</p>
        </div>
        <div id="step-3" class="guide-step" style="display:none;">
            <h4 id="ui-g3-t">第三步：固化结论</h4>
            <p id="ui-g3-d">执行 AI 给出的 DSL，或使用智能坍缩来记录长对话。</p>
        </div>
    </div>
</div>

<script>
    const i18n = {
        zh: {
            title: "CODECART v1.1.8", token: "Token 约节约: ~", lang: "EN/ZH", theme: "🌓 模式",
            guideStart: "🐣 小白指引", helperTitle: "AI 调教助手", helperDesc: "生成对话发给 AI，使其输出格式化指令。",
            copyPrompt: "复制调教语", copyCtx: "📋 复制上下文", claim: "+结论", supersede: ">替代", anchor: "+锚点",
            idTip: "建议 ID: phy_ (物理), hw_ (硬件), mkt_ (市场)", placeholder: "贴入 DSL 指令或 AI 原始对话文本...",
            exec: "⚡ 执行指令", smart: "🧠 智能坍缩", helpTitle: "指令速查表", helpClose: "关闭",
            helpText: "<b>+CLAIM(id, '内容')</b>: 记录事实结论。<br><b>>SUPERSEDE(旧, 新, '理由')</b>: 逻辑演化替代。<br><b>+ANCHOR('内容')</b>: 全局硬约束。<br><br>💡 核心技巧：让 AI 替你写指令并粘贴回来。",
            g1t: "第一步：设置锚点", g1d: "点击底部的 +锚点，先写下不可妥协的约束条件。",
            g2t: "第二步：同步背景", g2d: "点击左侧『复制上下文』，把当前有效逻辑同步给 AI。",
            g3t: "第三步：固化结论", g3d: "把 AI 输出的 DSL 粘回来执行，或直接用智能坍缩记录长文本。",
            prompt: "请作为我的研究助理。在我接下来的提问中，请在给出分析后，务必将核心结论总结为 CodeCart DSL 格式：+CLAIM(id, '内容')。如果涉及逻辑更新，请使用 >SUPERSEDE(旧id, 新id, '理由')。",
            copied: "已复制到剪贴板！", alertId: "请输入一个 ID (如 phy_01):", emptyTitle: "卡带还是空的", emptyDesc: "点击『🐣 小白指引』开始，或把 AI 对话粘贴到底部输入框后点击『🧠 智能坍缩』。"
        },
        en: {
            title: "CODECART v1.1.8", token: "Estimated tokens saved: ~", lang: "EN/ZH", theme: "🌓 THEME",
            guideStart: "🐣 GUIDE", helperTitle: "PROMPT HELPER", helperDesc: "Guide AI to output structured CodeCart DSL.",
            copyPrompt: "COPY PROMPT", copyCtx: "📋 SYNC CONTEXT", claim: "+CLAIM", supersede: ">SUPERSEDE", anchor: "+ANCHOR",
            idTip: "ID Tip: phy_ (physics), hw_ (hardware)", placeholder: "Paste DSL or raw chat text here...",
            exec: "⚡ EXECUTE", smart: "🧠 COLLAPSE", helpTitle: "Cheat Sheet", helpClose: "CLOSE",
            helpText: "<b>+CLAIM(id, 'text')</b>: Add logic node.<br><b>>SUPERSEDE(old, new, 'why')</b>: Update logic flow.<br><b>+ANCHOR('text')</b>: Hard constraint.<br><br>💡 Tip: Ask AI to write DSL for you and paste it back.",
            g1t: "Step 1: Set Anchors", g1d: "Click +ANCHOR at the bottom and write down your non-negotiable constraints first.",
            g2t: "Step 2: Sync Context", g2d: "Click SYNC CONTEXT on the left to bring the AI up to your current working state.",
            g3t: "Step 3: Commit Logic", g3d: "Paste back AI-generated DSL to execute, or use COLLAPSE to compress raw text into a node.",
            prompt: "Act as my research assistant. In your future responses, please summarize the core findings into CodeCart DSL format: +CLAIM(id, 'content'). If updating a previous point, use >SUPERSEDE(old_id, new_id, 'reason').",
            copied: "Copied to clipboard!", alertId: "Enter an ID (e.g., phy_01):", emptyTitle: "Your cartridge is still empty", emptyDesc: "Click '🐣 GUIDE' to start, or paste an AI conversation into the bottom input box and click '🧠 COLLAPSE'."
        }
    };

    class CodeCartV118 {
        constructor() {
            this.lang = 'zh'; this.data = { nodes: [], totalSaved: 0 };
            this.currentStep = 0; this.init();
        }
        init() {
            this.updateUI();
            this.render();
            if (!localStorage.getItem('cc_guided')) {
                localStorage.setItem('cc_guided', '1');
                setTimeout(() => this.startGuide(), 500);
            }
        }
        toggleTheme() { document.body.classList.toggle('dark-mode'); }
        toggleLang() { 
            this.lang = this.lang === 'zh' ? 'en' : 'zh'; 
            this.updateUI(); 
        }

        updateUI() {
            const t = i18n[this.lang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('token-display').innerText = t.token + this.data.totalSaved + (this.lang === 'zh' ? '（估算）' : ' (est.)');
            document.getElementById('btn-lang').innerText = t.lang;
            document.getElementById('btn-theme').innerText = t.theme;
            document.getElementById('btn-guide-start').innerText = t.guideStart;
            document.getElementById('ui-helper-title').innerText = t.helperTitle;
            document.getElementById('ui-helper-desc').innerText = t.helperDesc;
            document.getElementById('btn-copy-prompt').innerText = t.copyPrompt;
            document.getElementById('btn-copy-ctx').innerText = t.copyCtx;
            document.getElementById('btn-add-claim').innerText = t.claim;
            document.getElementById('btn-add-supersede').innerText = t.supersede;
            document.getElementById('btn-add-anchor').innerText = t.anchor;
            document.getElementById('ui-id-tip').innerText = t.idTip;
            document.getElementById('console-input').placeholder = t.placeholder;
            document.getElementById('btn-exec').innerText = t.exec;
            document.getElementById('btn-smart').innerText = t.smart;
            document.getElementById('ui-help-title').innerText = t.helpTitle;
            document.getElementById('btn-help-close').innerText = t.helpClose;
            document.getElementById('ui-help-content').innerHTML = t.helpText;
            document.getElementById('ui-g1-t').innerText = t.g1t; document.getElementById('ui-g1-d').innerText = t.g1d;
            document.getElementById('ui-g2-t').innerText = t.g2t; document.getElementById('ui-g2-d').innerText = t.g2d;
            document.getElementById('ui-g3-t').innerText = t.g3t; document.getElementById('ui-g3-d').innerText = t.g3d;
        }

        toggleHelp() { 
            const m = document.getElementById('modal-overlay');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; 
        }
        startGuide() { this.currentStep = 1; document.getElementById('guide-overlay').style.display = 'flex'; this.showStep(); }
        nextStep() { this.currentStep++; this.currentStep > 3 ? document.getElementById('guide-overlay').style.display = 'none' : this.showStep(); }
        showStep() {
            document.querySelectorAll('.guide-step').forEach(s => s.style.display = 'none');
            document.getElementById('step-' + this.currentStep).style.display = 'block';
        }

        copyAIPrompt() { navigator.clipboard.writeText(i18n[this.lang].prompt); alert(i18n[this.lang].copied); }
        copyContext() {
            const act = this.data.nodes.filter(n => !n.isSuperseded || n.type === 'anchor');
            navigator.clipboard.writeText(`[CODECART CONTEXT]\n${act.map(n => `${n.type==='anchor'?'⚓':'+'} ${n.id}: ${n.content}`).join('\n')}`);
            alert(i18n[this.lang].copied);
        }

        insertCmd(t) { const i = document.getElementById('console-input'); i.value += (i.value ? '\n' : '') + t; i.focus(); }
        
        execute() {
            const txt = document.getElementById('console-input').value;
            const cP = /\+CLAIM\(([^,]+),\s*["'“]([^"'”]+)["'”]\)/gi;
            const sP = />SUPERSEDE\(([^,]+),\s*([^,]+),\s*["'“]([^"'”]+)["'”]\)/gi;
            const aP = /\+ANCHOR\(["'“]([^"'”]+)["'”]\)/gi;
            let m, f = false;
            while ((m = cP.exec(txt))) { this.addNode(m[1].trim(), m[2], 'claim'); f = true; }
            while ((m = sP.exec(txt))) { this.supersede(m[1].trim()); f = true; }
            while ((m = aP.exec(txt))) { this.addNode('ANC_'+Date.now().toString().slice(-4), m[1], 'anchor'); f = true; }
            if (f) { this.data.totalSaved += Math.max(1, Math.round(txt.length * 0.3)); this.updateUI(); document.getElementById('console-input').value = ''; this.render(); }
        }

        addNode(id, content, type) { const n = { uid: Date.now()+Math.random(), id, content, type, isSuperseded: false }; this.data.nodes.push(n); return n; }
        supersede(o) { const t = this.data.nodes.find(node => node.id.toLowerCase() === o.toLowerCase()); if (t) t.isSuperseded = true; }
        deleteNode(uid) { if(confirm("Confirm Delete?")) { this.data.nodes = this.data.nodes.filter(n => n.uid !== uid); this.render(); } }

        smartCollapse() {
            const txt = document.getElementById('console-input').value; if (!txt) return;
            const id = prompt(i18n[this.lang].alertId);
            if (id) { this.addNode(id, txt.substring(0,400), 'claim'); this.data.totalSaved += Math.max(1, Math.round(txt.length * 0.3)); this.updateUI(); document.getElementById('console-input').value = ''; this.render(); }
        }

        render() {
            const c = document.getElementById('canvas'); c.innerHTML = '';
            this.data.nodes.forEach(n => {
                const d = document.createElement('div');
                d.className = `node ${n.type} ${n.isSuperseded ? 'superseded' : ''}`;
                d.innerHTML = `<span class="del-btn" onclick="store.deleteNode(${n.uid})">×</span><span class="node-id">${n.id}</span><div class="node-content">${n.content}</div>`;
                c.appendChild(d);
            });
        }
        exportJSON() { const b = new Blob([JSON.stringify(this.data, null, 2)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `CodeCart_v1.1.8.json`; a.click(); }
    }
    const store = new CodeCartV118();
</script>
</body>
</html>
