<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCart v1.1.2 - Robust & Intuitive</title>
    <style>
        :root {
            --bg-sidebar: #f2f2f7; --bg-canvas: #ffffff; --bg-console: #e5e5ea;
            --accent-blue: #007aff; --accent-gray: #8e8e93; --text-main: #1c1c1e;
            --border: #d1d1d6; --node-bg: #ffffff; --node-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body.dark {
            --bg-sidebar: #1c1c1e; --bg-canvas: #000000; --bg-console: #2c2c2e;
            --accent-blue: #0a84ff; --accent-gray: #636366; --text-main: #f2f2f7;
            --border: #38383a; --node-bg: #2c2c2e; --node-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; color: var(--text-main); overflow: hidden; background: var(--bg-canvas); transition: 0.3s; }

        header {
            height: 48px; background: var(--bg-sidebar); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 20px;
            border-bottom: 1px solid var(--border); font-size: 13px; z-index: 100;
        }
        .controls { display: flex; gap: 10px; align-items: center; }
        .token-badge { background: var(--bg-canvas); padding: 2px 10px; border-radius: 12px; border: 1px solid var(--border); font-family: monospace; color: var(--accent-blue); font-weight: bold; }

        .app-layout { display: flex; height: calc(100% - 248px); }

        aside { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .protocol-box { margin: 15px; padding: 12px; background: var(--bg-canvas); border-radius: 10px; font-size: 11px; border: 1px dashed var(--accent-gray); line-height: 1.5; }

        main { flex: 1; position: relative; background: var(--bg-canvas); overflow: hidden; }
        #canvas { width: 100%; height: 100%; position: relative; }
        
        .timeline-container { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 85%; background: rgba(128,128,128,0.1); padding: 12px 20px; 
            border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px; box-shadow: var(--node-shadow);
        }
        #timeline-slider { flex: 1; accent-color: var(--accent-blue); cursor: pointer; }
        .time-label { font-size: 10px; font-family: monospace; color: var(--accent-gray); min-width: 60px; text-align: center; }

        footer { height: 200px; background: var(--bg-console); border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .console-toolbar { background: var(--border); padding: 6px 15px; font-size: 11px; display: flex; justify-content: space-between; font-weight: 600; }
        
        .cmd-bar { display: flex; gap: 8px; padding: 6px 15px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); }
        .cmd-btn { padding: 3px 10px; font-size: 11px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-canvas); cursor: pointer; color: var(--accent-blue); font-family: monospace; font-weight: bold; }
        .cmd-btn:hover { background: var(--accent-blue); color: #fff; }

        textarea { flex: 1; background: transparent; border: none; padding: 12px; font-family: 'SF Mono', 'Courier New', monospace; font-size: 13px; outline: none; color: var(--text-main); line-height: 1.5; }
        .action-bar { padding: 10px 15px; display: flex; gap: 10px; background: var(--border); }
        
        button { padding: 8px 14px; border-radius: 6px; border: none; background: var(--accent-blue); color: #fff; cursor: pointer; font-weight: 500; font-size: 12px; }
        button.secondary { background: var(--accent-gray); }

        #help-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 480px; background: var(--bg-sidebar); border: 1px solid var(--border);
            border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); z-index: 1000; padding: 25px;
        }

        .node { 
            position: absolute; padding: 12px; background: var(--node-bg); border: 1px solid var(--border); 
            border-radius: 8px; font-size: 12px; box-shadow: var(--node-shadow); 
            max-width: 200px; transition: 0.4s; z-index: 10;
        }
        .node.anchor { border-left: 5px solid var(--accent-blue); font-weight: bold; }
        .node.superseded { text-decoration: line-through; opacity: 0.3; }
        .node-id { font-weight: 800; font-size: 10px; color: var(--accent-blue); display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div><strong id="ui-title">CodeCart v1.1.2</strong> | <small id="ui-subtitle">Robust Logic Tool</small></div>
    <div class="controls">
        <div class="token-badge" id="token-display">Saved: 0</div>
        <button class="secondary" onclick="store.toggleLang()" id="btn-lang">EN/ZH</button>
        <button class="secondary" onclick="store.toggleTheme()" id="btn-theme">🌓 Theme</button>
        <button class="secondary" onclick="store.toggleHelp()">?</button>
    </div>
</header>

<div class="app-layout">
    <aside>
        <div class="protocol-box" id="ui-protocol">
            <strong>🚀 Protocol</strong><br>1. Sync to AI<br>2. Get DSL<br>3. Commit
        </div>
        <div class="entity-list" id="entity-index" style="padding:10px; font-size:12px;"></div>
        <div style="padding: 15px;">
            <button onclick="store.copyContext()" style="width: 100%;" id="btn-copy">📋 Copy Context</button>
        </div>
    </aside>

    <main>
        <div id="canvas"></div>
        <div class="timeline-container">
            <span class="time-label" id="ui-history">HISTORY</span>
            <input type="range" id="timeline-slider" min="0" max="0" value="0" oninput="store.playHistory(this.value)">
            <span class="time-label" id="time-indicator">LIVE</span>
        </div>
    </main>
</div>

<footer>
    <div class="console-toolbar">
        <span id="ui-console-title">Console (v2.5 Robust)</span>
        <span id="status-line">System Ready</span>
    </div>
    <div class="cmd-bar">
        <button class="cmd-btn" onclick="store.insertCmd('+CLAIM(id, \'\')')">+CLAIM</button>
        <button class="cmd-btn" onclick="store.insertCmd('>SUPERSEDE(old, new, \'\')')">>SUPERSEDE</button>
        <button class="cmd-btn" onclick="store.insertCmd('+ANCHOR(\'\')')">+ANCHOR</button>
    </div>
    <textarea id="console-input" placeholder="+CLAIM(phy_01, 'Text')"></textarea>
    <div class="action-bar">
        <button onclick="store.execute()" id="btn-exec">⚡ Execute</button>
        <button class="secondary" onclick="store.smartCollapse()" id="btn-smart">🧠 Smart Collapse</button>
        <button class="secondary" onclick="store.exportJSON()" id="btn-export">💾 Export</button>
        <button class="secondary" onclick="store.reset()" id="btn-reset">🆕 Reset</button>
    </div>
</footer>

<div id="help-modal">
    <h3 id="help-title">Command Guide</h3>
    <div style="font-size:13px; line-height:1.6;">
        <p><strong>+CLAIM(id, "content")</strong><br><small id="h-claim">Add logic node</small></p>
        <p><strong>>SUPERSEDE(old, new, "reason")</strong><br><small id="h-supersede">Update/Replace node</small></p>
        <p><strong>+ANCHOR("text")</strong><br><small id="h-anchor">Set hard constraint</small></p>
        <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
        <button onclick="store.toggleHelp()" style="width: 100%;">Close / 关闭</button>
    </div>
</div>

<script>
    const i18n = {
        zh: {
            title: "CodeCart v1.1.2", subtitle: "稳健逻辑卡带", protocol: "<strong>🚀 协作协议</strong><br>1. 复制上下文给 AI<br>2. 获取 AI 输出的 DSL<br>3. 贴回并执行固化",
            copy: "📋 复制上下文", history: "历史回溯", console: "控制台 (v2.5 稳健型)", exec: "⚡ 执行指令", smart: "🧠 智能坍缩", export: "💾 导出 JSON", reset: "🆕 重置",
            ready: "系统就绪", helpT: "命令指南", hClaim: "添加新的逻辑断言节点", hSupersede: "替代旧节点，追踪演化路径", hAnchor: "设置全局硬约束（不随时间衰减）"
        },
        en: {
            title: "CodeCart v1.1.2", subtitle: "Robust Logic Tool", protocol: "<strong>🚀 Protocol</strong><br>1. Sync Context to AI<br>2. Get DSL Logic from AI<br>3. Commit to Execute",
            copy: "📋 Copy Context", history: "HISTORY", console: "Console (v2.5 Robust)", exec: "⚡ Execute", smart: "🧠 Smart Collapse", export: "💾 Export JSON", reset: "🆕 Reset",
            ready: "System Ready", helpT: "Command Guide", hClaim: "Add a new logic assertion node", hSupersede: "Replace an old node with a new one", hAnchor: "Set hard constraints that never decay"
        }
    };

    class MasterCodeCart {
        constructor() {
            this.lang = 'en'; this.theme = 'light'; this.history = []; 
            this.data = { nodes: [], totalSaved: 0 };
            this.init();
        }

        init() { this.saveStep(); this.updateUI(); this.render(); }
        toggleLang() { this.lang = this.lang === 'zh' ? 'en' : 'zh'; this.updateUI(); }
        toggleTheme() { this.theme = this.theme === 'light' ? 'dark' : 'light'; document.body.className = this.theme; }
        toggleHelp() { const m = document.getElementById('help-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        insertCmd(tpl) { const i = document.getElementById('console-input'); i.value += (i.value ? '\n' : '') + tpl; i.focus(); }

        updateUI() {
            const t = i18n[this.lang];
            document.getElementById('ui-title').innerText = t.title; document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('ui-protocol').innerHTML = t.protocol; document.getElementById('btn-copy').innerText = t.copy;
            document.getElementById('ui-history').innerText = t.history; document.getElementById('ui-console-title').innerText = t.console;
            document.getElementById('btn-exec').innerText = t.exec; document.getElementById('btn-smart').innerText = t.smart;
            document.getElementById('btn-export').innerText = t.export; document.getElementById('btn-reset').innerText = t.reset;
            document.getElementById('status-line').innerText = t.ready; document.getElementById('help-title').innerText = t.helpT;
            document.getElementById('h-claim').innerText = t.hClaim; document.getElementById('h-supersede').innerText = t.hSupersede;
            document.getElementById('h-anchor').innerText = t.hAnchor;
        }

        saveStep() { this.history.push(JSON.parse(JSON.stringify(this.data))); const s = document.getElementById('timeline-slider'); s.max = this.history.length - 1; s.value = s.max; }

        execute() {
            const txt = document.getElementById('console-input').value;
            // 修正：不区分大小写 (i)，兼容中英文引号
            const cP = /\+CLAIM\(([^,]+),\s*["'“]([^"'”]+)["'”]\)/gi;
            const sP = />SUPERSEDE\(([^,]+),\s*([^,]+),\s*["'“]([^"'”]+)["'”]\)/gi;
            const aP = /\+ANCHOR\(["'“]([^"'”]+)["'”]\)/gi;
            let m, f = false;
            while ((m = cP.exec(txt))) { this.addNode(m[1].trim(), m[2], 'claim'); f = true; }
            while ((m = sP.exec(txt))) { this.supersede(m[1].trim(), m[2].trim(), m[3]); f = true; }
            while ((m = aP.exec(txt))) { this.addNode('ANC_'+Date.now(), m[1], 'anchor'); f = true; }
            if (f) { 
                this.data.totalSaved += Math.floor(txt.length * 0.8);
                document.getElementById('token-display').innerText = `Saved: ${this.data.totalSaved}`;
                document.getElementById('console-input').value = ''; this.render(); 
            }
        }

        addNode(id, content, type) {
            this.data.nodes.push({ id, content, type, lastCited: Date.now(), isSuperseded: false, x: Math.random()*500+50, y: Math.random()*300+50 });
            this.saveStep();
        }

        supersede(o, n, r) {
            const target = this.data.nodes.find(node => node.id.toLowerCase() === o.toLowerCase());
            if (target) { target.isSuperseded = true; target.supersededBy = n; target.reason = r; target.lastCited = Date.now(); }
            this.saveStep();
        }

        playHistory(v) { this.render(this.history[v]); document.getElementById('time-indicator').innerText = v == this.history.length-1 ? "LIVE" : "T-"+(this.history.length-1-v); }

        render(state = this.data) {
            const c = document.getElementById('canvas'); c.innerHTML = '';
            state.nodes.forEach(n => {
                const d = document.createElement('div');
                const age = (Date.now() - n.lastCited) / 3600000;
                const weight = n.type === 'anchor' ? 1 : Math.max(0.4, 1 - age);
                d.className = `node ${n.type} ${n.isSuperseded ? 'superseded' : ''}`;
                d.style.left = n.x+'px'; d.style.top = n.y+'px';
                d.style.opacity = n.isSuperseded ? 0.2 : weight;
                d.innerHTML = `<span class="node-id">${n.id}</span>${n.content}`;
                c.appendChild(d);
            });
        }

        copyContext() {
            const active = this.data.nodes.filter(n => !n.isSuperseded || n.type === 'anchor');
            const txt = `[CODECART CONTEXT]\n${active.map(n => `${n.type==='anchor'?'⚓':'+'} ${n.id}: ${n.content}`).join('\n')}`;
            navigator.clipboard.writeText(txt);
            document.getElementById('status-line').innerText = this.lang==='zh'?"已复制":"Copied";
        }

        smartCollapse() {
            const txt = document.getElementById('console-input').value; if (!txt) return;
            const id = prompt(this.lang==='zh'?"输入 ID:":"ID:");
            if (id) { this.addNode(id, txt.substring(0,60)+"...", 'claim'); this.render(); }
        }

        exportJSON() {
            const b = new Blob([JSON.stringify(this.data, null, 2)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `CodeCart_v1.1.2.json`; a.click();
        }

        reset() { if(confirm(this.lang==='zh'?"确定重置？":"Reset?")) location.reload(); }
    }
    const store = new MasterCodeCart();
</script>
</body>
</html>
