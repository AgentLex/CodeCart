<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCart – Cognitive Memory Cartridge</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface-2:#21262d;
  --text:#e6edf3;--muted:#8b949e;
  --primary:#58a6ff;--primary-dim:rgba(88,166,255,.12);
  --ok:#3fb950;--warn:#d29922;--err:#f85149;
  --border:#30363d;--r:8px;
}
[data-theme="light"]{
  --bg:#e3e6e8;--surface:#f0f2f5;--surface-2:#dadddf;
  --text:#24292f;--muted:#6e7781;
  --primary:#0969da;--primary-dim:rgba(9,105,218,.1);
  --ok:#1a7f37;--warn:#9a6700;--err:#cf222e;
  --border:#c2c9d1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;
  display:grid;grid-template-columns:230px 1fr 310px;
}
/* ——— LEFT ——— */
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.brand{padding:14px 16px;border-bottom:1px solid var(--border);}
.brand h1{font-size:17px;font-weight:700;color:var(--primary);letter-spacing:-.3px;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.ctrl-row{display:flex;gap:5px;margin-top:8px;}
.sm-btn{padding:4px 9px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;}
.sm-btn:hover{border-color:var(--primary);color:var(--primary);}
.sec{padding:10px 14px;border-bottom:1px solid var(--border);}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.lens-btn{width:100%;padding:7px 10px;text-align:left;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:7px;}
.lens-btn.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.anc-card{background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.25);border-radius:6px;padding:7px;font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:5px;}
.anc-icon{color:var(--err);font-size:11px;font-weight:700;margin-bottom:3px;}
.sidebar-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.full-btn{width:100%;padding:8px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text);text-align:left;}
.full-btn.hi{background:var(--primary);border-color:var(--primary);color:#0d1117;font-weight:700;text-align:center;}

/* ——— CENTER ——— */
#center{display:flex;flex-direction:column;overflow:hidden;}
#graph-area{flex:1;position:relative;background:var(--bg);overflow:hidden;}
svg#g{width:100%;height:100%;}
.grid-line{stroke:var(--border);stroke-width:.5;opacity:.4;}
.edge{stroke:var(--border);stroke-width:1.5;fill:none;marker-end:url(#arrow);}
.n-rect{stroke-width:1.5;rx:8;ry:8;}
.n-grp{cursor:pointer;}
.n-grp.sel .n-rect{stroke-width:2.5; filter:drop-shadow(0 0 8px var(--primary));}
#timeline-bar{border-top:1px solid var(--border);background:var(--surface);padding:8px 18px 10px;}
.tl-head{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
#tslider{width:100%;height:4px;accent-color:var(--primary);cursor:pointer;}

/* ——— RIGHT ——— */
#right{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:9px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:12px;cursor:pointer;}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
#tab-body{flex:1;overflow-y:auto;padding:13px;}
#console-sec{border-top:1px solid var(--border);padding:11px;background:var(--bg);flex-shrink:0;}
#dsl-in{width:100%;height:66px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px;color:var(--text);font-family:ui-monospace,monospace;font-size:11px;resize:none;outline:none;}
.c-btns{display:flex;gap:5px;margin-top:7px;}
.c-btn{flex:1;padding:6px;font-size:11px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);}
.c-btn.exec{background:var(--primary);border-color:var(--primary);color:#0d1117;font-weight:700;}
#c-log{margin-top:6px;font-family:ui-monospace,monospace;font-size:10.5px;min-height:16px;line-height:1.4;}
#c-log.ok{color:var(--ok);}
#c-log.er{color:var(--err);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;width:540px;max-width:90vw;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="brand"><h1>CodeCart</h1><div class="brand-sub" id="b-sub">认知记忆卡带</div>
    <div class="ctrl-row"><button class="sm-btn" onclick="toggleTheme()">🌓 Theme</button><button class="sm-btn" onclick="toggleLang()" id="lang-btn">EN</button></div>
  </div>
  <div class="sec">
    <div class="sec-lbl" id="lbl-lens">透镜视角</div>
    <button class="lens-btn on" data-lens="all" onclick="setLens(this)"><span class="dot"></span><span id="l-all">全局视角</span></button>
    <button class="lens-btn" data-lens="engineering" onclick="setLens(this)"><span class="dot"></span><span id="l-eng">工程视角</span></button>
    <div style="display:flex; gap:4px; margin-bottom:2px;">
      <button class="lens-btn" data-lens="custom" onclick="setLens(this)" style="flex:1;"><span class="dot"></span><span id="l-cust">自定义视角</span></button>
      <button class="sm-btn" onclick="configCustomLens()">⚙️</button>
    </div>
  </div>
  <div class="sec"><div class="sec-lbl" id="lbl-anc">硬约束锚点</div><div id="anc-list"></div></div>
  <div class="sidebar-foot">
    <button class="full-btn" onclick="resetCartridge()" id="btn-new">🆕 新建卡带</button>
    <button class="full-btn" onclick="loadSeedData()" id="btn-seed">🌱 加载示例</button>
    <button class="full-btn hi" onclick="openPromptModal()" id="btn-copy">📋 复制给 AI</button>
    <button class="full-btn" onclick="saveCartridge()" id="btn-save">💾 保存卡带</button>
  </div>
</aside>

<div id="center">
  <div id="graph-area">
    <svg id="g"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--border)"/></marker></defs>
      <g id="grid-layer"></g><g id="edge-layer"></g><g id="node-layer"></g>
    </svg>
    <div id="empty-hint" style="display:none;position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:13px;pointer-events:none;">
      <span style="font-size:28px">📭</span><span id="empty-txt">当前视角无内容</span>
    </div>
  </div>
  <div id="timeline-bar">
    <div class="tl-head"><span id="tl-lbl">4D 时间轴</span><span id="tl-cur"></span></div>
    <input type="range" id="tslider" min="0" max="100" value="100">
  </div>
</div>

<div id="right">
  <div class="tabs"><button class="tab on" onclick="showTab('guide',this)" id="tab-guide">💡 指引</button><button class="tab" onclick="showTab('detail',this)" id="tab-detail">🔍 详情</button></div>
  <div id="tab-body"><div id="pane-guide"><div id="guide-steps"></div></div><div id="pane-detail" style="display:none"><div id="detail-body"></div></div></div>
  <div id="console-sec">
    <div class="c-lbl" id="lbl-console">操作控制台</div>
    <textarea id="dsl-in"></textarea>
    <div class="c-btns">
      <button class="c-btn exec" onclick="execDSL()" id="btn-exec">执行</button>
      <button class="c-btn" onclick="clearConsole()" id="btn-clr">清空</button>
    </div>
    <div id="c-log"></div>
  </div>
</div>

<div class="overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="m-title">为 AI 生成的上下文</h3>
    <textarea id="m-ta" style="width:100%;height:200px;margin:10px 0;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px;font-size:11px;" readonly></textarea>
    <div style="display:flex; justify-content:flex-end; gap:8px;">
      <button class="c-btn" onclick="closeModal()" id="btn-m-close">关闭</button>
      <button class="c-btn exec" onclick="copyPrompt()" id="m-copy">复制到剪贴板</button>
    </div>
  </div>
</div>

<script id="memory-data" type="application/json">
{
  "meta":{"version":"0.7","name":"Demo"},
  "lenses":[{"id":"all","include":[]},{"id":"engineering","include":["engineering"]},{"id":"custom","include":["_none_"]}],
  "anchors":[{"id":"anc_01","statement":"系统支持离线运行。","observed_at":"2026-04-01T00:00:00Z"}],
  "entities":[{"id":"ent_core","label":"认知内核","observed_at":"2026-04-01T00:00:00Z","tags":["engineering"],"x":400,"y":240}],
  "claims":[{"id":"clm_01","entity_ids":["ent_core"],"statement":"单文件架构。","epistemic_state":"approved","observed_at":"2026-04-01T00:00:00Z","tags":["engineering"],"x":400,"y":100}],
  "relations":[{"from":"ent_core","to":"clm_01","type":"has_claim"}]
}
</script>

<script>
const seedRaw = document.getElementById('memory-data').textContent;
let M = { meta:{name:"Empty"}, entities:[], claims:[], anchors:[], relations:[], lenses:JSON.parse(seedRaw).lenses };
let lang = 'zh'; let currentLens = 'all'; let currentTimeISO = new Date().toISOString(); let selectedId = null;

const T = {
  zh:{
    bsub:'认知记忆卡带', lblLens:'透镜视角', lblAnc:'硬约束锚点', lblConsole:'操作控制台', lAll:'全局视角',lEng:'工程视角',lCust:'自定义视角',
    btnNew:'🆕 新建卡带', btnSeed:'🌱 加载示例', btnCopy:'📋 复制给 AI', btnSave:'💾 保存卡带', btnExec:'执行指令', btnClr:'清空',
    tabGuide:'💡 指引', tabDetail:'🔍 详情', tlLbl:'4D 时间轴', emptyTxt:'视角无内容', mTitle:'为 AI 生成的上下文', mCopy:'复制到剪贴板',
    detDefault:'点击节点查看详情。', btnMClose:'关闭', dslPlc:'+CLAIM(ID, "内容")',
    dLabel:'名称/内容', dStatus:'状态', dObserved:'记录时间',
    guide:[{t:'鲁棒解析', d:'内容中可包含任意引号，系统会自动匹配最后一对。'},{t:'4D 时间轴', d:'现在支持分秒级回溯，即使连续操作也能分清先后。'}]
  },
  en:{
    bsub:'Cognitive Memory Cartridge', lblLens:'LENSES', lblAnc:'ANCHORS', lblConsole:'CONSOLE', lAll:'Global View',lEng:'Engineering',lCust:'Custom View',
    btnNew:'🆕 New Cartridge', btnSeed:'🌱 Load Demo', btnCopy:'📋 Copy Context', btnSave:'💾 Save Cartridge', btnExec:'Execute', btnClr:'Clear',
    tabGuide:'💡 Guide', tabDetail:'🔍 Details', tlLbl:'4D Timeline', emptyTxt:'No nodes found.', mTitle:'Context for AI', mCopy:'Copy to Clipboard',
    detDefault:'Click node for details.', btnMClose:'Close', dslPlc:'+CLAIM(ID, "Statement")',
    dLabel:'Label/Content', dStatus:'Status', dObserved:'Observed At',
    guide:[{t:'Robust Parser', d:'Supports nested quotes. Parser finds the last closing bracket.'},{t:'4D Timeline', d:'Now supports micro-precision scrolling for instant updates.'}]
  }
};

function t(k){ return T[lang][k] || k; }

function allTimes(){
  const ts = [...M.entities, ...M.claims, ...M.anchors].map(x => new Date(x.observed_at).getTime()).filter(n => !isNaN(n));
  return ts.length ? ts : [Date.now()];
}
function latest(){ return new Date(Math.max(...allTimes())).toISOString(); }
function earliest(){ return new Date(Math.min(...allTimes())).toISOString(); }

function sliderToISO(v){
  const a = Math.min(...allTimes());
  let b = Math.max(...allTimes());
  // 核心修复：如果时间相同（都在分秒内），虚构一个1分钟范围让滑块动起来
  if (a === b) { b = a + 60000; }
  return new Date(a + (b - a) * v / 100).toISOString();
}

function visible(item){
  const tHit = new Date(item.observed_at).getTime() <= new Date(currentTimeISO).getTime();
  if(currentLens === 'all') return tHit;
  const lens = M.lenses.find(l => l.id === currentLens);
  const tagHit = !lens.include.length || (item.tags || []).some(tag => lens.include.includes(tag));
  return tHit && tagHit;
}

function execDSL(){
  const raw = document.getElementById('dsl-in').value.trim(); const log = document.getElementById('c-log');
  try {
    const lines = raw.replace(/```[a-z]*\n?/g, '').split('\n').filter(l => l.includes('+CLAIM'));
    if(!lines.length) throw new Error(t('emptyTxt'));
    lines.forEach(line => {
        const start = line.indexOf('('); const end = line.lastIndexOf(')');
        if(start === -1 || end === -1) return;
        const inner = line.substring(start + 1, end).trim();
        const splitIdx = inner.search(/[,，\s:]/);
        const eId = splitIdx === -1 ? "ent_auto" : inner.substring(0, splitIdx).trim();
        let content = splitIdx === -1 ? inner : inner.substring(splitIdx + 1).trim();
        content = content.replace(/^["'“‘`](.*)["'”’`]$/s, '$1');
        let ent = M.entities.find(e => e.id === eId);
        if(!ent) { 
          ent = {id: eId, label: eId, observed_at: new Date().toISOString(), x: 400, y: 225, tags:[]}; 
          M.entities.push(ent); 
        }
        const nc = {id: 'clm_'+Math.random().toString(36).slice(2,7), entity_ids:[eId], statement: content, observed_at: new Date().toISOString(), x: ent.x+Math.random()*120-60, y: ent.y-120, tags:[]};
        M.claims.push(nc); M.relations.push({from: eId, to: nc.id, type: 'has_claim'});
    });
    log.className = 'ok'; log.textContent = '✅ OK'; 
    currentTimeISO = latest(); document.getElementById('tslider').value = 100;
    render();
  } catch(e) { log.className = 'er'; log.textContent = '❌ ' + e.message; }
}

function render(){
  const nl = document.getElementById('node-layer'); nl.innerHTML = '';
  const el = document.getElementById('edge-layer'); el.innerHTML = '';
  const svg = document.getElementById('g'); drawGrid(svg);
  M.entities.forEach(e => { if(visible(e)) nl.appendChild(svgNode(e.id, e.x, e.y, e.label, 'ENTITY', 'entity')); });
  M.claims.forEach(c => { if(visible(c)) nl.appendChild(svgNode(c.id, c.x, c.y, c.statement, 'CLAIM', 'claim')); });
  M.relations.forEach(r => {
    const f = M.entities.find(x=>x.id===r.from)||M.claims.find(x=>x.id===r.from);
    const t = M.entities.find(x=>x.id===r.to)||M.claims.find(x=>x.id===r.to);
    if(f && t && visible(f) && visible(t)) {
      const l = document.createElementNS('[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)', 'line');
      l.setAttribute('x1', f.x); l.setAttribute('y1', f.y); l.setAttribute('x2', t.x); l.setAttribute('y2', t.y);
      l.setAttribute('stroke', 'var(--border)'); l.setAttribute('marker-end', 'url(#arrow)'); el.appendChild(l);
    }
  });
  document.getElementById('tl-cur').textContent = currentTimeISO.replace('T',' ').substring(0,19);
  const anc = document.getElementById('anc-list'); anc.innerHTML = '';
  (M.anchors || []).forEach(a => { if(visible(a)) anc.innerHTML += `<div class="anc-card"><div class="anc-icon">⚓ ANCHOR</div>${a.statement}</div>`; });
  document.getElementById('empty-hint').style.display = (nl.childElementCount === 0 && M.claims.length > 0) ? 'flex' : 'none';
}

function svgNode(id,x,y,label,sub,kind){
  const g = document.createElementNS('[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)', 'g'); g.setAttribute('class','n-grp'+(selectedId===id?' sel':'')); g.setAttribute('transform',`translate(${x-80},${y-28})`); g.onclick=()=>onNodeClick(id);
  const r = document.createElementNS('[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)', 'rect'); r.setAttribute('width',160); r.setAttribute('height',56); r.setAttribute('fill','var(--surface-2)'); r.setAttribute('stroke',kind==='entity'?'var(--primary)':'var(--muted)'); r.setAttribute('class','n-rect');
  const t1 = document.createElementNS('[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)', 'text'); t1.setAttribute('x',80); t1.setAttribute('y',24); t1.setAttribute('text-anchor','middle'); t1.setAttribute('fill','var(--text)'); t1.setAttribute('font-size','11'); t1.textContent = label.substring(0,14) + (label.length>14?'...':'');
  const t2 = document.createElementNS('[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)', 'text'); t2.setAttribute('x',80); t2.setAttribute('y',42); t2.setAttribute('text-anchor','middle'); t2.setAttribute('fill','var(--muted)'); t2.setAttribute('font-size','9'); t2.textContent = sub;
  g.append(r, t1, t2); return g;
}

function drawGrid(svg){
  const gl = document.getElementById('grid-layer'); gl.innerHTML = '';
  const w = svg.clientWidth || 800, h = svg.clientHeight || 500;
  for(let x=0; x<w; x+=60){ const l=document.createElementNS('[http://www.w3.org/2000/svg','line](http://www.w3.org/2000/svg','line)'); l.setAttribute('x1',x);l.setAttribute('y1',0);l.setAttribute('x2',x);l.setAttribute('y2',h); l.setAttribute('class','grid-line'); gl.appendChild(l); }
  for(let y=0; y<h; y+=60){ const l=document.createElementNS('[http://www.w3.org/2000/svg','line](http://www.w3.org/2000/svg','line)'); l.setAttribute('x1',0);l.setAttribute('y1',y);l.setAttribute('x2',w);l.setAttribute('y2',y); l.setAttribute('class','grid-line'); gl.appendChild(l); }
}

function onNodeClick(id){
  selectedId = id; showTab('detail'); 
  const item = [...M.entities, ...M.claims].find(x => x.id === id);
  document.getElementById('detail-body').innerHTML = `
    <div class="d-field"><div class="d-lbl">ID</div><div class="d-val">${item.id}</div></div>
    <div class="d-field"><div class="d-lbl">${t('dLabel')}</div><div class="d-val">${item.label || item.statement}</div></div>
    <div class="d-field"><div class="d-lbl">${t('dObserved')}</div><div class="d-val">${item.observed_at.replace('T',' ').substring(0,19)}</div></div>
  `;
  render();
}

function showTab(n, b){
  document.getElementById('pane-guide').style.display = n === 'guide' ? 'block' : 'none';
  document.getElementById('pane-detail').style.display = n === 'detail' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  (b || document.getElementById('tab-' + n)).classList.add('on');
}

function resetCartridge(){ if(confirm(t('btnNew') + '?')) { M.entities=[]; M.claims=[]; M.relations=[]; M.anchors=[]; render(); } }
function loadSeedData(){ M = JSON.parse(seedRaw); currentTimeISO = latest(); render(); }
function toggleTheme(){ const r = document.documentElement; r.setAttribute('data-theme', r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
function setLens(btn){ currentLens = btn.getAttribute('data-lens'); document.querySelectorAll('.lens-btn').forEach(x => x.classList.remove('on')); btn.classList.add('on'); render(); }
function configCustomLens(){ const i = prompt('Tags:', 'demo'); if(i){ M.lenses.find(l => l.id === 'custom').include = i.split(','); setLens(document.querySelector('[data-lens="custom"]')); } }
function openPromptModal(){ document.getElementById('m-ta').value = `Context:\n${M.claims.map(c => `- [${c.id}] ${c.statement}`).join('\n')}\n\nUpdate using: +CLAIM(ID, "Text")`; document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function copyPrompt(){ navigator.clipboard.writeText(document.getElementById('m-ta').value); closeModal(); }
function clearConsole(){ document.getElementById('dsl-in').value = ''; document.getElementById('c-log').textContent = ''; }

function toggleLang(){ lang = lang === 'zh' ? 'en' : 'zh'; applyLang(); render(); }
function applyLang(){
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
  const mapping = {
    'b-sub':'bsub', 'lbl-lens':'lblLens', 'lbl-anc':'lblAnc', 'lbl-console':'lblConsole',
    'l-all':'lAll', 'l-eng':'lEng', 'l-cust':'lCust', 'btn-new':'btnNew', 'btn-seed':'btnSeed',
    'btn-copy':'btnCopy', 'btn-save':'btnSave', 'btn-exec':'btnExec', 'btn-clr':'btnClr',
    'tab-guide':'tabGuide', 'tab-detail':'tabDetail', 'tl-lbl':'tlLbl', 'empty-txt':'emptyTxt',
    'm-title':'mTitle', 'm-copy':'mCopy', 'btn-m-close':'btnMClose'
  };
  Object.keys(mapping).forEach(id => { const el = document.getElementById(id); if(el) el.textContent = t(mapping[id]); });
  document.getElementById('dsl-in').placeholder = t('dslPlc');
  const db = document.getElementById('detail-body'); if(db.innerHTML === "" || db.innerText.includes("Click") || db.innerText.includes("点击")) db.textContent = t('detDefault');
  const el = document.getElementById('guide-steps'); el.innerHTML = '';
  (t('guide') || []).forEach((s, i) => { el.innerHTML += `<div class="g-step"><div class="g-num">${i+1}</div><div><div class="g-title">${s.t}</div><div class="g-desc">${s.d}</div></div></div>`; });
}

document.getElementById('tslider').oninput = (e) => { currentTimeISO = sliderToISO(e.target.value); render(); };
async function saveCartridge(){
  const blob = new Blob([JSON.stringify(M, null, 2)], {type: 'application/json'});
  if('showSaveFilePicker' in window){ const h = await window.showSaveFilePicker({suggestedName:'CodeCart.json'}); const w = await h.createWritable(); await w.write(blob); await w.close(); }
  else { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'CodeCart.json'; a.click(); }
}
window.onresize = () => render();
applyLang(); render();
