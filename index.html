<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCart – Cognitive Memory Cartridge</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface-2:#21262d;
  --text:#e6edf3;--muted:#8b949e;
  --primary:#58a6ff;--primary-dim:rgba(88,166,255,.12);
  --ok:#3fb950;--warn:#d29922;--err:#f85149;
  --border:#30363d;--r:8px;
}
[data-theme="light"]{
  --bg:#e3e6e8;--surface:#f0f2f5;--surface-2:#dadddf;
  --text:#24292f;--muted:#6e7781;
  --primary:#0969da;--primary-dim:rgba(9,105,218,.1);
  --ok:#1a7f37;--warn:#9a6700;--err:#cf222e;
  --border:#c2c9d1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;
  display:grid;grid-template-columns:230px 1fr 310px;
}
/* ——— LEFT ——— */
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.brand{padding:14px 16px;border-bottom:1px solid var(--border);}
.brand-row{display:flex;align-items:center;justify-content:space-between;}
.brand h1{font-size:17px;font-weight:700;color:var(--primary);letter-spacing:-.3px;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.ctrl-row{display:flex;gap:5px;margin-top:8px;}
.sm-btn{padding:4px 9px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;}
.sm-btn:hover{border-color:var(--primary);color:var(--primary);}
.sec{padding:10px 14px;border-bottom:1px solid var(--border);}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.lens-btn{width:100%;padding:7px 10px;text-align:left;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:2px;transition:.15s;display:flex;align-items:center;gap:7px;}
.lens-btn:hover{background:var(--surface-2);color:var(--text);}
.lens-btn.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.anc-card{background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.25);border-radius:6px;padding:7px;font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:5px;}
.anc-icon{color:var(--err);font-size:11px;font-weight:700;margin-bottom:3px;}
.sidebar-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.full-btn{width:100%;padding:8px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text);text-align:left;transition:.15s;}
.full-btn:hover{border-color:var(--primary);color:var(--primary);}
.full-btn.hi{background:var(--primary);border-color:var(--primary);color:#0d1117;font-weight:700;text-align:center;}
.full-btn.hi:hover{opacity:.87;color:#0d1117;}

/* ——— CENTER ——— */
#center{display:flex;flex-direction:column;overflow:hidden;}
#graph-area{flex:1;position:relative;overflow:hidden;background:var(--bg);}
svg#g{width:100%;height:100%;}
.grid-line{stroke:var(--border);stroke-width:.5;opacity:.4;}
.edge{stroke:var(--border);stroke-width:1.5;fill:none;marker-end:url(#arrow);}
.edge.constrain{stroke:var(--err);stroke-dasharray:5,3;opacity:.6;}
.edge.supersede{stroke:var(--muted);stroke-dasharray:4,4;opacity:.5;}
.n-rect{stroke-width:1.5;rx:8;ry:8;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));}
.n-txt{font-family:inherit;pointer-events:none;}
.n-badge{font-size:10px;pointer-events:none;}
.n-grp{cursor:pointer;}
.n-grp:hover .n-rect{filter:drop-shadow(0 0 10px var(--primary));}
.n-grp.sel .n-rect{stroke-width:2.5;}
#timeline-bar{border-top:1px solid var(--border);background:var(--surface);padding:8px 18px 10px;}
.tl-head{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
#tslider{width:100%;height:4px;accent-color:var(--primary);cursor:pointer;}
.tl-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px;}

/* ——— RIGHT ——— */
#right{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:9px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.15s;}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
#tab-body{flex:1;overflow-y:auto;padding:13px;}
.g-step{display:flex;gap:9px;margin-bottom:14px;}
.g-num{width:22px;height:22px;border-radius:50%;background:var(--primary-dim);border:1px solid var(--primary);color:var(--primary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.g-title{font-size:12px;font-weight:600;margin-bottom:2px;}
.g-desc{font-size:11px;color:var(--muted);line-height:1.55;}
.d-field{margin-bottom:10px;}
.d-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px;}
.d-val{font-size:12px;line-height:1.5;}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;}
.b-approved{background:rgba(63,185,80,.12);color:var(--ok);border:1px solid rgba(63,185,80,.3);}
.b-proposed{background:rgba(210,153,34,.12);color:var(--warn);border:1px solid rgba(210,153,34,.3);}
.b-superseded{background:rgba(110,118,129,.12);color:var(--muted);border:1px solid rgba(110,118,129,.3);}
#console-sec{border-top:1px solid var(--border);padding:11px;background:var(--bg);flex-shrink:0;}
.c-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
#dsl-in{width:100%;height:66px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px;color:var(--text);font-family:ui-monospace,monospace;font-size:11px;resize:none;outline:none;}
.c-btns{display:flex;gap:5px;margin-top:7px;}
.c-btn{flex:1;padding:6px;font-size:11px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);}
.c-btn.exec{background:var(--primary);border-color:var(--primary);color:#0d1117;font-weight:700;}
#c-log{margin-top:6px;font-family:ui-monospace,monospace;font-size:10.5px;min-height:16px;line-height:1.4;color:var(--muted);}
#c-log.ok{color:var(--ok);}
#c-log.er{color:var(--err);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;width:540px;max-width:90vw;}
.m-ta{width:100%;height:180px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px;color:var(--text);font-family:ui-monospace,monospace;font-size:11px;resize:none;}
.m-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="brand">
    <div class="brand-row"><h1>CodeCart</h1></div>
    <div class="brand-sub" id="b-sub">认知记忆卡带</div>
    <div class="ctrl-row">
      <button class="sm-btn" onclick="toggleTheme()" title="切换主题">🌓 主题</button>
      <button class="sm-btn" onclick="toggleLang()" id="lang-btn">EN</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl" id="lbl-lens">透镜视角</div>
    <button class="lens-btn on" data-lens="all" onclick="setLens(this)"><span class="dot"></span><span id="l-all">全局视角</span></button>
    <button class="lens-btn" data-lens="engineering" onclick="setLens(this)"><span class="dot"></span><span id="l-eng">工程视角</span></button>
    <div style="display:flex; gap:4px; margin-bottom:2px;">
      <button class="lens-btn" data-lens="custom" onclick="setLens(this)" style="flex:1; margin-bottom:0;"><span class="dot"></span><span id="l-cust">自定义视角</span></button>
      <button class="sm-btn" onclick="configCustomLens()" title="配置自定义透镜" style="font-size:13px; padding:0 8px;">⚙️</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl" id="lbl-anc">硬约束锚点</div>
    <div id="anc-list"></div>
  </div>

  <div class="sidebar-foot">
    <button class="full-btn" onclick="resetCartridge()" id="btn-new">🆕 新建卡带</button>
    <button class="full-btn" onclick="loadSeedData()" id="btn-seed">🌱 加载示例</button>
    <button class="full-btn hi" onclick="openPromptModal()" id="btn-copy">📋 复制给 AI</button>
    <button class="full-btn" onclick="saveCartridge()" id="btn-save">💾 保存卡带</button>
  </div>
</aside>

<div id="center">
  <div id="graph-area">
    <svg id="g">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--border)"/></marker>
        <marker id="arrow-err" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--err)" opacity=".6"/></marker>
      </defs>
      <g id="grid-layer"></g><g id="edge-layer"></g><g id="node-layer"></g>
    </svg>
    <div id="empty-hint" style="display:none;position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:13px;gap:6px;pointer-events:none;">
      <span style="font-size:28px">📭</span><span id="empty-txt">当前视角无内容</span>
    </div>
  </div>

  <div id="timeline-bar">
    <div class="tl-head"><span id="tl-lbl">4D 时间轴</span><span id="tl-cur"></span></div>
    <input type="range" id="tslider" min="0" max="100" value="100">
    <div class="tl-dates"><span id="tl-from"></span><span id="tl-to"></span></div>
  </div>
</div>

<div id="right">
  <div class="tabs">
    <button class="tab on" onclick="showTab('guide',this)" id="tab-guide">💡 指引</button>
    <button class="tab" onclick="showTab('detail',this)" id="tab-detail">🔍 详情</button>
  </div>
  <div id="tab-body">
    <div id="pane-guide"><div id="guide-steps"></div></div>
    <div id="pane-detail" style="display:none"><div id="detail-body" style="color:var(--muted);font-size:12px;line-height:1.6;">点击节点查看详情。</div></div>
  </div>
  <div id="console-sec">
    <div class="c-lbl" id="lbl-console">控制台</div>
    <textarea id="dsl-in" placeholder="+CLAIM(ent_id, &quot;描述&quot;, tags=[engineering])"></textarea>
    <div class="c-btns">
      <button class="c-btn exec" onclick="execDSL()" id="btn-exec">执行</button>
      <button class="c-btn" onclick="clearConsole()" id="btn-clr">清空</button>
    </div>
    <div id="c-log"></div>
  </div>
</div>

<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="m-title">为 AI 生成的上下文</h3>
    <textarea class="m-ta" id="m-ta" readonly></textarea>
    <div class="m-btns">
      <button class="m-btn" onclick="closeModal()">关闭</button>
      <button class="m-btn hi" onclick="copyPrompt()" id="m-copy">复制到剪贴板</button>
    </div>
  </div>
</div>

<script id="memory-data" type="application/json">
{
  "meta":{"version":"0.2","name":"Demo Cartridge","lang":"zh"},
  "lenses":[
    {"id":"all","include":[],"exclude":[]},
    {"id":"engineering","include":["engineering"],"exclude":["marketing"]},
    {"id":"custom","include":["_none_"],"exclude":[]}
  ],
  "anchors":[
    {"id":"anc_01","statement":"系统必须支持跨平台离线运行。","tags":["constraint","engineering","demo"],"observed_at":"2026-04-01","superseded_at":null}
  ],
  "entities":[
    {"id":"ent_core","label":"认知内核","type":"module","desc":"CodeCart 核心数据层。","tags":["engineering","demo"],"observed_at":"2026-04-01","superseded_at":null,"x":400,"y":240}
  ],
  "claims":[
    {"id":"clm_01","entity_ids":["ent_core"],"statement":"采用单文件 HTML 架构以实现物理隔离。","epistemic_state":"approved","tags":["engineering","demo"],"scope":["engineering"],"confidence":0.95,"author":"user","observed_at":"2026-04-01","superseded_at":null,"x":400,"y":100}
  ],
  "evidences":[],
  "relations":[{"from":"ent_core","to":"clm_01","type":"has_claim"}],
  "change_log":[]
}
</script>

<script>
const seedRaw = document.getElementById('memory-data').textContent;
let M = { meta:{name:"Empty"}, entities:[], claims:[], anchors:[], relations:[], change_log:[], lenses:JSON.parse(seedRaw).lenses };
let lang = 'zh'; let currentLens = 'all'; let currentTimeISO = new Date().toISOString(); let selectedId = null;

const T = {
zh:{
  bsub:'认知记忆卡带', lblLens:'透镜视角', lblAnc:'硬约束锚点', lblConsole:'操作控制台',
  lAll:'全局视角',lEng:'工程视角',lCust:'自定义视角',
  btnNew:'🆕 新建卡带', btnSeed:'🌱 加载示例', btnCopy:'📋 复制给 AI', btnSave:'💾 保存卡带',
  btnExec:'执行', btnClr:'清空', tabGuide:'💡 指引', tabDetail:'🔍 详情',
  tlLbl:'4D 时间轴', emptyTxt:'当前视角无内容',
  mTitle:'为 AI 生成的上下文', mCopy:'复制到剪贴板', detDefault:'点击节点查看详情。',
  guide:[
    {t:'新建与重置', d:'点击「新建卡带」清空内存。'},
    {t:'加载示例', d:'点击「加载示例」学习「智能花园」模版。'},
    {t:'视角切换', d:'「全局」显示所有，「工程」过滤技术标签，「自定义」由⚙️设置。'}
  ]
},
en:{
  bsub:'Memory Cartridge', lblLens:'LENSES', lblAnc:'ANCHORS', lblConsole:'CONSOLE',
  lAll:'Global',lEng:'Engineering',lCust:'Custom',
  btnNew:'🆕 New', btnSeed:'🌱 Load Demo', btnCopy:'📋 Copy Context', btnSave:'💾 Save',
  btnExec:'Execute', btnClr:'Clear', tabGuide:'💡 Guide', tabDetail:'🔍 Details',
  tlLbl:'4D Timeline', emptyTxt:'No nodes found.',
  mTitle:'Context for AI', mCopy:'Copy', detDefault:'Click node for details.',
  guide:[
    {t:'New Project', d:'Click "New" for a blank canvas.'},
    {t:'Load Demo', d:'Click "Load Demo" to see the "Smart Garden" template.'},
    {t:'Filter Lens', d:'Toggle views. Gear icon sets custom tags.'}
  ]
}
};

function t(k){ return T[lang][k]; }
function allTimes(){ return [...M.entities,...M.claims,...M.anchors].map(x=>x.observed_at).filter(Boolean).map(x=>new Date(x).getTime()); }
function latest(){ const ts=allTimes(); return ts.length?new Date(Math.max(...ts)).toISOString():new Date().toISOString(); }
function earliest(){ const ts=allTimes(); return ts.length?new Date(Math.min(...ts)).toISOString():new Date().toISOString(); }
function sliderToISO(v){ const a=new Date(earliest()).getTime(), b=new Date(latest()).getTime(); return new Date(a+(b-a)*v/100).toISOString(); }
function visibleAt(item,iso){ const t=new Date(iso).getTime(); const obs=item.observed_at?new Date(item.observed_at).getTime():-Infinity; const sup=item.superseded_at?new Date(item.superseded_at).getTime():Infinity; return obs<=t && t<sup; }
function matchLens(item){ if(currentLens==='all') return true; const lens=M.lenses.find(l=>l.id===currentLens); if(!lens) return true; const tags=item.tags||[]; const inc=lens.include||[]; const exc=lens.exclude||[]; return (inc.length===0||inc.some(tag=>tags.includes(tag))) && !exc.some(tag=>tags.includes(tag)); }
function visible(item){ return visibleAt(item,currentTimeISO)&&matchLens(item); }

function configCustomLens(){
    const input = prompt(lang==='zh'?'配置自定义标签（逗号分隔）:':'Set custom tags (comma separated):', "demo");
    if (input !== null) {
        const lens = M.lenses.find(l => l.id === 'custom');
        if (lens) { lens.include = input.split(',').map(t => t.trim()).filter(Boolean); setLens(document.querySelector('[data-lens="custom"]')); }
    }
}

function resetCartridge(){
    if(!confirm(lang==='zh'?'确定新建吗？':'Start a new blank cartridge?')) return;
    M.entities = []; M.claims = []; M.anchors = []; M.relations = []; M.change_log = []; M.evidences = [];
    selectedId = null; currentTimeISO = new Date().toISOString(); render();
}

function loadSeedData(){
    M = JSON.parse(seedRaw);
    currentTimeISO = latest();
    render();
    alert(lang==='zh'?'示例已加载。':'Demo loaded.');
}

function drawGrid(svg){
  const gl=document.getElementById('grid-layer'); gl.innerHTML='';
  const W=svg.clientWidth||800, H=svg.clientHeight||500;
  for(let x=0;x<W;x+=60){ const l=document.createElementNS('http://www.w3.org/2000/svg','line'); l.setAttribute('x1',x);l.setAttribute('y1',0);l.setAttribute('x2',x);l.setAttribute('y2',H); l.setAttribute('class','grid-line');gl.appendChild(l); }
  for(let y=0;y<H;y+=60){ const l=document.createElementNS('http://www.w3.org/2000/svg','line'); l.setAttribute('x1',0);l.setAttribute('y1',y);l.setAttribute('x2',W);l.setAttribute('y2',y); l.setAttribute('class','grid-line');gl.appendChild(l); }
}

function nodePos(item){ const svg=document.getElementById('g'); const W=svg.clientWidth||800, H=svg.clientHeight||450; return {x:(item.x/800)*W, y:(item.y/450)*H}; }

function drawEdges(){
  const el=document.getElementById('edge-layer'); el.innerHTML='';
  const allNodes=[...M.entities,...M.claims,...(M.anchors||[])];
  (M.relations||[]).forEach(r=>{
    const from=allNodes.find(x=>x.id===r.from); const to=allNodes.find(x=>x.id===r.to);
    if(!from||!to||!visible(from)||!visible(to)) return;
    const fp=nodePos(from), tp=nodePos(to);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',fp.x); line.setAttribute('y1',fp.y); line.setAttribute('x2',tp.x); line.setAttribute('y2',tp.y);
    line.setAttribute('class',r.type==='constrains'?'edge constrain':'edge');
    line.setAttribute('marker-end',r.type==='constrains'?'url(#arrow-err)':'url(#arrow)');
    el.appendChild(line);
  });
}

const STATE_COLORS={ approved:{fill:'rgba(63,185,80,.12)',stroke:'#3fb950'}, proposed:{fill:'rgba(210,153,34,.12)',stroke:'#d29922'}, superseded:{fill:'rgba(110,118,129,.1)',stroke:'#6e7781'}, anchor:{fill:'rgba(248,81,73,.08)',stroke:'rgba(248,81,73,.4)'}, entity:{fill:'rgba(88,166,255,.1)',stroke:'#58a6ff'} };

function svgNode(id,x,y,label,subtitle,state,kind){
  const W=160,H=56; const col=STATE_COLORS[kind==='entity'?'entity':kind==='anchor'?'anchor':(state||'approved')]||STATE_COLORS.approved;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','n-grp'+(selectedId===id?' sel':'')); g.setAttribute('transform',`translate(${x-W/2},${y-H/2})`); g.onclick=()=>onNodeClick(id,kind);
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect'); rect.setAttribute('width',W);rect.setAttribute('height',H); rect.setAttribute('fill',col.fill);rect.setAttribute('stroke',col.stroke); rect.setAttribute('class','n-rect'); g.appendChild(rect);
  const txt=document.createElementNS('http://www.w3.org/2000/svg','text'); txt.setAttribute('x',W/2);txt.setAttribute('y',22); txt.setAttribute('text-anchor','middle');txt.setAttribute('fill','var(--text)'); txt.setAttribute('font-size','12'); txt.textContent=label.length>(lang==='zh'?10:18)?label.slice(0,lang==='zh'?10:18)+'…':label; g.appendChild(txt);
  const sub=document.createElementNS('http://www.w3.org/2000/svg','text'); sub.setAttribute('x',W/2);sub.setAttribute('y',38); sub.setAttribute('text-anchor','middle');sub.setAttribute('fill','var(--muted)'); sub.setAttribute('font-size','10'); sub.textContent=subtitle; g.appendChild(sub);
  return g;
}

function render(){
  const svg=document.getElementById('g'); drawGrid(svg); drawEdges();
  const nl=document.getElementById('node-layer'); nl.innerHTML=''; let count=0;
  (M.anchors||[]).forEach(a=>{ if(!visible(a)) return; const p=nodePos(a); nl.appendChild(svgNode(a.id,p.x,p.y,a.statement,'⚓ ANCHOR',null,'anchor')); count++; });
  M.entities.forEach(e=>{ if(!visible(e)) return; const p=nodePos(e); nl.appendChild(svgNode(e.id,p.x,p.y,e.label,e.type,null,'entity')); count++; });
  M.claims.forEach(c=>{ if(!visible(c)) return; const p=nodePos(c); const state=c.epistemic_state||'proposed'; nl.appendChild(svgNode(c.id,p.x,p.y,c.statement,state,state,'claim')); count++; });
  document.getElementById('empty-hint').style.display=count===0?'flex':'none';
  document.getElementById('tl-from').textContent=earliest().slice(0,10);
  document.getElementById('tl-to').textContent=latest().slice(0,10);
  document.getElementById('tl-cur').textContent=currentTimeISO.slice(0,10);
  renderAnchors();
}

function onNodeClick(id,kind){
  selectedId=id; showTab('detail',document.getElementById('tab-detail'));
  const item=kind==='entity'?M.entities.find(x=>x.id===id):kind==='claim'?M.claims.find(x=>x.id===id):(M.anchors||[]).find(x=>x.id===id);
  document.getElementById('detail-body').innerHTML=`<div class="d-field"><div class="d-lbl">ID</div><div class="d-val">${item.id}</div></div><div class="d-field"><div class="d-lbl">Content</div><div class="d-val">${item.label||item.statement}</div></div>`;
  render();
}

function showTab(name,btnEl){
  document.getElementById('pane-guide').style.display=name==='guide'?'block':'none';
  document.getElementById('pane-detail').style.display=name==='detail'?'block':'none';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on')); btnEl.classList.add('on');
}

function setLens(btn){ currentLens=btn.getAttribute('data-lens'); document.querySelectorAll('.lens-btn').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); render(); }

function execDSL(){
  const raw=document.getElementById('dsl-in').value.trim(); const log=document.getElementById('c-log');
  try{
    if(raw.startsWith('+CLAIM(')){
      const m=raw.match(/^\+CLAIM\(\s*(\S+?)\s*,\s*["'`](.+?)["'`](?:\s*,\s*tags=\[([^\]]*)\])?\s*\)$/);
      if(!m) throw new Error('Format Error');
      const eId=m[1]; let ent=M.entities.find(e=>e.id===eId);
      if(!ent) { ent={id:eId,label:eId,type:"auto",tags:[],observed_at:new Date().toISOString(),x:400,y:225}; M.entities.push(ent); }
      const nc={id:'clm_'+Math.random().toString(36).slice(2,8),entity_ids:[eId],statement:m[2],epistemic_state:'proposed',tags:(m[3]||'').split(',').map(x=>x.trim()).filter(Boolean),observed_at:new Date().toISOString().slice(0,10),x:ent.x+50,y:ent.y-100};
      M.claims.push(nc); M.relations.push({from:eId,to:nc.id,type:'has_claim'});
      log.className='ok'; log.textContent='✅ Added'; render();
    }
  }catch(err){ log.className='er'; log.textContent='❌ '+err.message; }
}

function openPromptModal(){
  const md=`# CodeCart Context\nActive Claims:\n${M.claims.filter(c=>visible(c)).map(c=>`- [${c.id}] ${c.statement}`).join('\n')}`;
  document.getElementById('m-ta').value=md; document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function copyPrompt(){ navigator.clipboard.writeText(document.getElementById('m-ta').value); closeModal(); }

async function saveCartridge(){
  const content=JSON.stringify(M,null,2);
  if('showSaveFilePicker' in window){
    const handle=await window.showSaveFilePicker({suggestedName:'CodeCart.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    const writable=await handle.createWritable(); await writable.write(content); await writable.close();
  }else{
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type:'application/json'})); a.download='CodeCart.json'; a.click();
  }
}

function toggleTheme(){ document.documentElement.setAttribute('data-theme',document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }
function toggleLang(){ lang=lang==='zh'?'en':'zh'; applyLang(); render(); }
function applyLang(){
  document.getElementById('lang-btn').textContent=lang==='zh'?'EN':'中文';
  document.getElementById('b-sub').textContent=t('bsub'); document.getElementById('lbl-lens').textContent=t('lblLens');
  document.getElementById('l-all').textContent=t('lAll'); document.getElementById('l-eng').textContent=t('lEng');
  document.getElementById('l-cust').textContent=t('lCust'); document.getElementById('btn-new').textContent=t('btnNew');
  document.getElementById('btn-seed').textContent=t('btnSeed'); document.getElementById('btn-copy').textContent=t('btnCopy');
  document.getElementById('btn-save').textContent=t('btnSave'); document.getElementById('btn-exec').textContent=t('btnExec');
  document.getElementById('btn-clr').textContent=t('btnClr'); document.getElementById('tab-guide').textContent=t('tabGuide');
  document.getElementById('tab-detail').textContent=t('tabDetail'); document.getElementById('lbl-anc').textContent=t('lblAnc');
  document.getElementById('lbl-console').textContent=t('lblConsole'); document.getElementById('tl-lbl').textContent=t('tlLbl');
  const el=document.getElementById('guide-steps'); el.innerHTML=''; (t('guide')||[]).forEach((s,i)=>{ el.innerHTML+=`<div class="g-step"><div class="g-num">${i+1}</div><div><div class="g-title">${s.t}</div><div class="g-desc">${s.d}</div></div></div>`; });
}
function renderAnchors(){ const anc=document.getElementById('anc-list'); anc.innerHTML=''; (M.anchors||[]).forEach(a=>{ anc.innerHTML+=`<div class="anc-card"><div class="anc-icon">⚓ ANCHOR</div>${a.statement}</div>`; }); }
function clearConsole(){ document.getElementById('dsl-in').value=''; document.getElementById('c-log').textContent=''; }

window.addEventListener('resize',()=>render());
applyLang(); render();
</script>
