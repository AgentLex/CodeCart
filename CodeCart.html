<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCart – Cognitive Memory Cartridge</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface-2:#21262d;
  --text:#e6edf3;--muted:#8b949e;
  --primary:#58a6ff;--primary-dim:rgba(88,166,255,.12);
  --ok:#3fb950;--warn:#d29922;--err:#f85149;
  --border:#30363d;--r:8px;
}
[data-theme="light"]{
  --bg:#e3e6e8;--surface:#f0f2f5;--surface-2:#dadddf;
  --text:#24292f;--muted:#6e7781;
  --primary:#0969da;--primary-dim:rgba(9,105,218,.1);
  --ok:#1a7f37;--warn:#9a6700;--err:#cf222e;
  --border:#c2c9d1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;
  display:grid;grid-template-columns:230px 1fr 310px;
}
/* ——— LEFT ——— */
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.brand{padding:14px 16px;border-bottom:1px solid var(--border);}
.brand-row{display:flex;align-items:center;justify-content:space-between;}
.brand h1{font-size:17px;font-weight:700;color:var(--primary);letter-spacing:-.3px;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.ctrl-row{display:flex;gap:5px;margin-top:8px;}
.sm-btn{padding:4px 9px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;}
.sm-btn:hover{border-color:var(--primary);color:var(--primary);}
.sec{padding:10px 14px;border-bottom:1px solid var(--border);}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.lens-btn{width:100%;padding:7px 10px;text-align:left;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:2px;transition:.15s;display:flex;align-items:center;gap:7px;}
.lens-btn:hover{background:var(--surface-2);color:var(--text);}
.lens-btn.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.anc-card{background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.25);border-radius:6px;padding:7px;font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:5px;}
.anc-icon{color:var(--err);font-size:11px;font-weight:700;margin-bottom:3px;}
.sidebar-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.full-btn{width:100%;padding:8px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text);text-align:left;transition:.15s;}
.full-btn:hover{border-color:var(--primary);color:var(--primary);}
.full-btn.hi{background:var(--primary);border-color:var(--primary);color:#0d1117;font-weight:700;text-align:center;}
.full-btn.hi:hover{opacity:.87;color:#0d1117;}
/* ——— CENTER ——— */
#center{display:flex;flex-direction:column;overflow:hidden;}
#graph-area{flex:1;position:relative;overflow:hidden;background:var(--bg);}
svg#g{width:100%;height:100%;}
.grid-line{stroke:var(--border);stroke-width:.5;opacity:.4;}
.edge{stroke:var(--border);stroke-width:1.5;fill:none;marker-end:url(#arrow);}
.edge.constrain{stroke:var(--err);stroke-dasharray:5,3;opacity:.6;}
.edge.supersede{stroke:var(--muted);stroke-dasharray:4,4;opacity:.5;}
.n-rect{stroke-width:1.5;rx:8;ry:8;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));}
.n-txt{font-family:inherit;pointer-events:none;}
.n-badge{font-size:10px;pointer-events:none;}
.n-grp{cursor:pointer;}
.n-grp:hover .n-rect{filter:drop-shadow(0 0 10px var(--primary));}
.n-grp.sel .n-rect{stroke-width:2.5;}
#timeline-bar{border-top:1px solid var(--border);background:var(--surface);padding:8px 18px 10px;}
.tl-head{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
#tslider{width:100%;height:4px;accent-color:var(--primary);cursor:pointer;}
.tl-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px;}
/* ——— RIGHT ——— */
#right{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:9px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.15s;}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
#tab-body{flex:1;overflow-y:auto;padding:13px;}
/* guide */
.g-step{display:flex;gap:9px;margin-bottom:14px;}
.g-num{width:22px;height:22px;border-radius:50%;background:var(--primary-dim);border:1px solid var(--primary);color:var(--primary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.g-title{font-size:12px;font-weight:600;margin-bottom:2px;}
.g-desc{font-size:11px;color:var(--muted);line-height:1.55;}
code{font-family:ui-monospace,monospace;font-size:10.5px;background:var(--surface-2);padding:1px 5px;border-radius:4px;color:var(--ok);}
/* detail */
.d-field{margin-bottom:10px;}
.d-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px;}
.d-val{font-size:12px;line-height:1.5;}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;}
.b-approved{background:rgba(63,185,80,.12);color:var(--ok);border:1px solid rgba(63,185,80,.3);}
.b-proposed{background:rgba(210,153,34,.12);color:var(--warn);border:1px solid rgba(210,153,34,.3);}
.b-superseded{background:rgba(110,118,129,.12);color:var(--muted);border:1px solid rgba(110,118,129,.3);}
.b-contested{background:rgba(248,81,73,.12);color:var(--err);border:1px solid rgba(248,81,73,.3);}
.ev-card{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:11px;line-height:1.5;margin-bottom:5px;color:var(--muted);}
/* console */
#console-sec{border-top:1px solid var(--border);padding:11px;background:var(--bg);flex-shrink:0;}
.c-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
#dsl-in{width:100%;height:66px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px;color:var(--text);font-family:ui-monospace,monospace;font-size:11px;resize:none;outline:none;transition:border-color .15s;}
#dsl-in:focus{border-color:var(--primary);}
.c-btns{display:flex;gap:5px;margin-top:7px;}
.c-btn{flex:1;padding:6px;font-size:11px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.15s;}
.c-btn:hover{border-color:var(--primary);color:var(--primary);}
.c-btn.exec{background:var(--primary);border-color:var(--primary);color:#0d1117;font-weight:700;}
.c-btn.exec:hover{opacity:.85;color:#0d1117;}
#c-log{margin-top:6px;font-family:ui-monospace,monospace;font-size:10.5px;min-height:16px;line-height:1.4;color:var(--muted);}
#c-log.ok{color:var(--ok);}
#c-log.er{color:var(--err);}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;width:540px;max-width:90vw;}
.modal h3{font-size:14px;margin-bottom:3px;}
.modal p{font-size:11px;color:var(--muted);margin-bottom:10px;}
.m-ta{width:100%;height:180px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px;color:var(--text);font-family:ui-monospace,monospace;font-size:11px;resize:none;margin-bottom:10px;}
.m-btns{display:flex;gap:8px;justify-content:flex-end;}
.m-btn{padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text);}
.m-btn.hi{background:var(--primary);border-color:var(--primary);color:#0d1117;font-weight:700;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="brand">
    <div class="brand-row">
      <h1>CodeCart</h1>
    </div>
    <div class="brand-sub" id="b-sub">认知记忆卡带 · 功能示范</div>
    <div class="ctrl-row">
      <button class="sm-btn" onclick="toggleTheme()" title="切换主题">🌓 主题</button>
      <button class="sm-btn" onclick="toggleLang()" id="lang-btn">EN</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl" id="lbl-lens">透镜视角</div>

    <button class="lens-btn" data-lens="demo" onclick="setLens(this)"><span class="dot"></span><span id="l-demo">🎬 示范视角</span></button>
    <button class="lens-btn" data-lens="engineering" onclick="setLens(this)"><span class="dot"></span><span id="l-eng">工程视角</span></button>
    <div style="display:flex; gap:4px; margin-bottom:2px;">
      <button class="lens-btn" data-lens="custom" onclick="setLens(this)" style="flex:1; margin-bottom:0;"><span class="dot"></span><span id="l-cust">自定义视角</span></button>
      <button class="sm-btn" onclick="configCustomLens()" title="配置自定义透镜" style="font-size:13px; padding:0 8px;">⚙️</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl" id="lbl-anc">硬约束锚点</div>
    <div id="anc-list"></div>
  </div>

  <div class="sidebar-foot">
    <button class="full-btn hi" onclick="openPromptModal()" id="btn-copy">📋 复制给 AI</button>
    <button class="full-btn" onclick="saveCartridge()" id="btn-save">💾 保存卡带</button>
  </div>
</aside>

<div id="center">
  <div id="graph-area">
    <svg id="g">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="var(--border)"/>
        </marker>
        <marker id="arrow-err" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="var(--err)" opacity=".6"/>
        </marker>
      </defs>
      <g id="grid-layer"></g>
      <g id="edge-layer"></g>
      <g id="node-layer"></g>
    </svg>
    <div id="empty-hint" style="display:none;position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:13px;gap:6px;pointer-events:none;">
      <span style="font-size:28px">📭</span>
      <span id="empty-txt">当前透镜 + 时间点下无节点</span>
    </div>
  </div>

  <div id="timeline-bar">
    <div class="tl-head">
      <span id="tl-lbl">4D 时间轴 — 拖动回溯历史</span>
      <span id="tl-cur"></span>
    </div>
    <input type="range" id="tslider" min="0" max="100" value="100">
    <div class="tl-dates">
      <span id="tl-from"></span>
      <span id="tl-to"></span>
    </div>
  </div>
</div>

<div id="right">
  <div class="tabs">
    <button class="tab on" onclick="showTab('guide',this)" id="tab-guide">💡 指引</button>
    <button class="tab" onclick="showTab('detail',this)" id="tab-detail">🔍 详情</button>
  </div>

  <div id="tab-body">
    <div id="pane-guide">
      <div id="guide-steps"></div>
    </div>
    <div id="pane-detail" style="display:none">
      <div id="detail-body" style="color:var(--muted);font-size:12px;line-height:1.6;">
        点击图谱中的节点查看详情与证据链。
      </div>
    </div>
  </div>

  <div id="console-sec">
    <div class="c-lbl" id="lbl-console">操作控制台 · 粘贴 AI 指令</div>
    <textarea id="dsl-in" placeholder="+CLAIM(ent_protocol, &quot;新方案描述&quot;, tags=[engineering])
>SUPERSEDE(clm_wifi, clm_ble, &quot;原因&quot;)"></textarea>
    <div class="c-btns">
      <button class="c-btn exec" onclick="execDSL()" id="btn-exec">执行</button>
      <button class="c-btn" onclick="clearConsole()" id="btn-clr">清空</button>
    </div>
    <div id="c-log"></div>
  </div>
</div>

<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="m-title">为 AI 生成的上下文（Markdown）</h3>
    <p id="m-desc">这是根据当前 Lens + 时间点自动生成的 Markdown。复制后粘贴给任意 AI，然后把 AI 给的 DSL 指令粘贴回右下控制台执行。</p>
    <textarea class="m-ta" id="m-ta" readonly></textarea>
    <div class="m-btns">
      <button class="m-btn" onclick="closeModal()">关闭</button>
      <button class="m-btn hi" onclick="copyPrompt()" id="m-copy">复制到剪贴板</button>
    </div>
  </div>
</div>

<script>
const raw0 = document.getElementById('memory-data').textContent;
let M = JSON.parse(raw0);
const M0 = JSON.parse(raw0);

let lang = 'zh';
let currentLens = 'all';
let currentTimeISO = latest();
let selectedId = null;

// ─── i18n ───
const T = {
zh:{
  bsub:'认知记忆卡带 · 功能示范',
  lblLens:'透镜视角', lblAnc:'硬约束锚点', lblConsole:'操作控制台 · 粘贴 AI 指令',
  lAll:'全局视角',lDemo:'🎬 示范视角',lEng:'工程视角',lCust:'自定义视角',
  btnCopy:'📋 复制给 AI', btnSave:'💾 保存卡带',
  btnExec:'执行', btnClr:'清空',
  tabGuide:'💡 指引', tabDetail:'🔍 详情',
  tlLbl:'4D 时间轴 — 拖动回溯历史',
  emptyTxt:'当前透镜 + 时间点下无节点',
  mTitle:'为 AI 生成的上下文（Markdown）',
  mDesc:'复制后粘贴给任意 AI，然后把 AI 给的 DSL 指令粘回右下控制台执行。',
  mCopy:'复制到剪贴板',
  detDefault:'点击图谱中的节点查看详情与证据链。',
  guide:[
    {t:'选择透镜', d:'左侧选择一个视角，图谱自动过滤出与该视角相关的节点。点击⚙️可配置自定义标签。'},
    {t:'复制上下文', d:'点击「复制给 AI」按钮，系统把当前可见的 Claims + Anchors 压缩为 Markdown。'},
    {t:'粘贴给 AI', d:'打开任意 AI 聊天页（Perplexity、Gemini等），把内容粘贴进去，提出问题。'},
    {t:'获取 DSL 指令', d:'告诉 AI："请用 DSL 格式回答，不要输出 JSON。" AI 会返回 +CLAIM(...)。'},
    {t:'执行 DSL', d:'把 AI 给的指令复制，粘贴进右下的控制台，点击「执行」，图谱立即更新。'},
    {t:'保存卡带', d:'点击「保存卡带」选择路径导出 JSON，存到 U 盘或云盘，实现物理隔离交接。'},
  ]
},
en:{
  bsub:'Cognitive Memory Cartridge · Demo',
  lblLens:'LENSES', lblAnc:'ANCHORS (Hard Constraints)', lblConsole:'ACTION CONSOLE · Paste AI DSL',
  lAll:'Global (All)',lDemo:'🎬 Demo Lens',lEng:'Engineering',lCust:'Custom View',
  btnCopy:'📋 Copy for AI', btnSave:'💾 Save Cartridge',
  btnExec:'Execute', btnClr:'Clear',
  tabGuide:'💡 Guide', tabDetail:'🔍 Details',
  tlLbl:'4D Timeline — drag to travel back in time',
  emptyTxt:'No nodes visible in current lens + time',
  mTitle:'Context for AI (Markdown)',
  mDesc:'Copy and paste this into any AI chat. Then paste the DSL commands AI returns into the console below.',
  mCopy:'Copy to Clipboard',
  detDefault:'Click a graph node to view details and evidence.',
  guide:[
    {t:'Choose a Lens', d:'Select a view on the left to filter the graph. Click ⚙️ to configure custom tags.'},
    {t:'Copy Context', d:'Click "Copy for AI" — compresses visible Claims + Anchors into Markdown.'},
    {t:'Paste to AI', d:'Open any AI chat (Perplexity, Gemini, etc.) and paste the Markdown.'},
    {t:'Get DSL Instructions', d:'Tell AI: "Reply using only DSL format." AI returns +CLAIM(...) lines.'},
    {t:'Execute DSL', d:'Copy lines, paste into the console, click Execute — graph updates instantly.'},
    {t:'Save Cartridge', d:'Click "Save Cartridge" to export JSON to disk for offline transfer.'},
  ]
}
};

function t(k){ return T[lang][k]; }

// ─── time helpers ───
function allTimes(){
  return [...M.entities,...M.claims,...M.anchors,...(M.evidences||[])]
    .map(x=>x.observed_at).filter(Boolean).map(x=>new Date(x).getTime());
}
function latest(){ const ts=allTimes(); return ts.length?new Date(Math.max(...ts)).toISOString():new Date().toISOString(); }
function earliest(){ const ts=allTimes(); return ts.length?new Date(Math.min(...ts)).toISOString():new Date().toISOString(); }
function sliderToISO(v){
  const a=new Date(earliest()).getTime(), b=new Date(latest()).getTime();
  return new Date(a+(b-a)*v/100).toISOString();
}
function visibleAt(item,iso){
  const t=new Date(iso).getTime();
  const obs=item.observed_at?new Date(item.observed_at).getTime():-Infinity;
  const sup=item.superseded_at?new Date(item.superseded_at).getTime():Infinity;
  return obs<=t && t<sup;
}

// ─── lens filter ───
function matchLens(item){
  if(currentLens==='all') return true;
  const lens=M.lenses.find(l=>l.id===currentLens);
  if(!lens) return true;
  const tags=item.tags||[];
  const inc=lens.include||[];
  const exc=lens.exclude||[];
  const inHit=inc.length===0||inc.some(tag=>tags.includes(tag));
  const exHit=exc.some(tag=>tags.includes(tag));
  return inHit&&!exHit;
}
function visible(item){ return visibleAt(item,currentTimeISO)&&matchLens(item); }

function configCustomLens(){
    const msg = lang==='zh'?'请输入自定义视角的包含标签（用逗号分隔，例如：engineering, ui）：':'Enter tags to include for Custom View (comma separated):';
    const input = prompt(msg, "engineering");
    if (input !== null) {
        const lens = M.lenses.find(l => l.id === 'custom');
        if (lens) {
            lens.include = input.split(',').map(t => t.trim()).filter(Boolean);
            const btn = document.querySelector('[data-lens="custom"]');
            if(btn) setLens(btn);
        }
    }
}

// ─── draw grid ───
function drawGrid(svg){
  const gl=document.getElementById('grid-layer');
  gl.innerHTML='';
  const W=svg.clientWidth||800, H=svg.clientHeight||500;
  const step=60;
  for(let x=0;x<W;x+=step){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x);l.setAttribute('y1',0);l.setAttribute('x2',x);l.setAttribute('y2',H);
    l.setAttribute('class','grid-line');gl.appendChild(l);
  }
  for(let y=0;y<H;y+=step){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',0);l.setAttribute('y1',y);l.setAttribute('x2',W);l.setAttribute('y2',y);
    l.setAttribute('class','grid-line');gl.appendChild(l);
  }
}

// ─── node coords (scale to current SVG size) ───
function nodePos(item){
  const svg=document.getElementById('g');
  const W=svg.clientWidth||800, H=svg.clientHeight||450;
  const refW=800, refH=450;
  return {x:(item.x/refW)*W, y:(item.y/refH)*H};
}

// ─── draw edges ───
function drawEdges(){
  const el=document.getElementById('edge-layer');
  el.innerHTML='';
  const allNodes=[...M.entities,...M.claims,...(M.anchors||[])];
  (M.relations||[]).forEach(r=>{
    const from=allNodes.find(x=>x.id===r.from);
    const to=allNodes.find(x=>x.id===r.to);
    if(!from||!to) return;
    if(!visible(from)||!visible(to)) return;
    const fp=nodePos(from), tp=nodePos(to);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',fp.x); line.setAttribute('y1',fp.y);
    line.setAttribute('x2',tp.x); line.setAttribute('y2',tp.y);
    let cls='edge';
    if(r.type==='constrains') cls='edge constrain';
    line.setAttribute('class',cls);
    if(r.type==='constrains') line.setAttribute('marker-end','url(#arrow-err)');
    else line.setAttribute('marker-end','url(#arrow)');
    el.appendChild(line);
  });
}

// ─── draw node ───
const STATE_COLORS={
  approved:{fill:'rgba(63,185,80,.12)',stroke:'#3fb950'},
  proposed:{fill:'rgba(210,153,34,.12)',stroke:'#d29922'},
  superseded:{fill:'rgba(110,118,129,.1)',stroke:'#6e7781'},
  contested:{fill:'rgba(248,81,73,.12)',stroke:'#f85149'},
  anchor:{fill:'rgba(248,81,73,.08)',stroke:'rgba(248,81,73,.4)'},
  entity:{fill:'rgba(88,166,255,.1)',stroke:'#58a6ff'},
};

function svgNode(id,x,y,label,subtitle,state,kind){
  const W=160,H=56;
  const col=STATE_COLORS[kind==='entity'?'entity':kind==='anchor'?'anchor':(state||'approved')]||STATE_COLORS.approved;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','n-grp'+(selectedId===id?' sel':''));
  g.setAttribute('id','ng_'+id);
  g.setAttribute('transform',`translate(${x-W/2},${y-H/2})`);
  g.onclick=()=>onNodeClick(id,kind);

  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('width',W);rect.setAttribute('height',H);
  rect.setAttribute('rx',8);rect.setAttribute('ry',8);
  rect.setAttribute('fill',col.fill);rect.setAttribute('stroke',col.stroke);
  rect.setAttribute('stroke-width',selectedId===id?'2.5':'1.5');
  rect.setAttribute('class','n-rect');
  g.appendChild(rect);

  const maxChars=lang==='zh'?10:18;
  const displayLabel=label.length>maxChars?label.slice(0,maxChars)+'…':label;
  const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x',W/2);txt.setAttribute('y',22);
  txt.setAttribute('text-anchor','middle');txt.setAttribute('fill','var(--text)');
  txt.setAttribute('font-size','12');txt.setAttribute('font-weight','600');
  txt.setAttribute('class','n-txt');
  txt.textContent=displayLabel;
  g.appendChild(txt);

  const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
  sub.setAttribute('x',W/2);sub.setAttribute('y',38);
  sub.setAttribute('text-anchor','middle');sub.setAttribute('fill','var(--muted)');
  sub.setAttribute('font-size','10');sub.setAttribute('class','n-badge');
  sub.textContent=subtitle;
  g.appendChild(sub);

  return g;
}

// ─── render graph ───
function render(){
  const svg=document.getElementById('g');
  drawGrid(svg);
  drawEdges();
  const nl=document.getElementById('node-layer');
  nl.innerHTML='';
  let count=0;

  (M.anchors||[]).forEach(a=>{
    if(!visible(a)) return;
    const p=nodePos(a);
    const short=a.statement.slice(0,20)+'…';
    nl.appendChild(svgNode(a.id,p.x,p.y,short,'⚓ ANCHOR',null,'anchor'));
    count++;
  });

  M.entities.forEach(e=>{
    if(!visible(e)) return;
    const p=nodePos(e);
    nl.appendChild(svgNode(e.id,p.x,p.y,e.label,e.type,null,'entity'));
    count++;
  });

  M.claims.forEach(c=>{
    if(!visible(c)) return;
    const p=nodePos(c);
    const state=c.epistemic_state||'proposed';
    const short=c.statement.slice(0,lang==='zh'?16:22)+'…';
    nl.appendChild(svgNode(c.id,p.x,p.y,short,state,state,'claim'));
    count++;
  });

  document.getElementById('empty-hint').style.display=count===0?'flex':'none';
  renderTimeline();
}

function renderTimeline(){
  const from=earliest().slice(0,10);
  const to=latest().slice(0,10);
  document.getElementById('tl-from').textContent=from;
  document.getElementById('tl-to').textContent=to;
  document.getElementById('tl-cur').textContent=currentTimeISO.slice(0,10);
  document.getElementById('tl-lbl').textContent=t('tlLbl');
  document.getElementById('empty-txt').textContent=t('emptyTxt');
}

// ─── detail panel ───
function onNodeClick(id,kind){
  selectedId=id;
  showTab('detail',document.getElementById('tab-detail'));
  let item=null;
  if(kind==='entity') item=M.entities.find(x=>x.id===id);
  else if(kind==='claim') item=M.claims.find(x=>x.id===id);
  else if(kind==='anchor') item=(M.anchors||[]).find(x=>x.id===id);
  if(!item){document.getElementById('detail-body').innerHTML=t('detDefault');return;}

  const evs=(M.evidences||[]).filter(e=>(e.claim_ids||[]).includes(id));
  const stateHTML=kind==='claim'?`<span class="badge b-${item.epistemic_state||'proposed'}">${item.epistemic_state||'?'}</span>`:'';
  const confHTML=item.confidence!=null?`<div class="d-field"><div class="d-lbl">Confidence</div><div class="d-val">${Math.round(item.confidence*100)}%</div></div>`:'';
  const evHTML=evs.length?`<div class="d-field"><div class="d-lbl">Evidence</div>${evs.map(e=>`<div class="ev-card">${e.excerpt}</div>`).join('')}</div>`:'';
  const descHTML=item.desc||item.statement?`<div class="d-field"><div class="d-lbl">${lang==='zh'?'内容':'Content'}</div><div class="d-val">${item.desc||item.statement}</div></div>`:'';

  document.getElementById('detail-body').innerHTML=`
    <div class="d-field"><div class="d-lbl">ID</div><div class="d-val" style="font-family:monospace;font-size:11px">${item.id}</div></div>
    <div class="d-field"><div class="d-lbl">${lang==='zh'?'名称/标题':'Label'}</div><div class="d-val">${item.label||item.statement?.slice(0,60)}</div></div>
    ${stateHTML?`<div class="d-field"><div class="d-lbl">${lang==='zh'?'状态':'Status'}</div><div class="d-val">${stateHTML}</div></div>`:''}
    ${confHTML}${descHTML}
    <div class="d-field"><div class="d-lbl">${lang==='zh'?'出现时间':'Observed'}</div><div class="d-val">${item.observed_at||'-'}</div></div>
    ${item.superseded_at?`<div class="d-field"><div class="d-lbl">${lang==='zh'?'废弃时间':'Superseded'}</div><div class="d-val">${item.superseded_at}</div></div>`:''}
    ${evHTML}
  `;
  render();
}

// ─── tabs ───
function showTab(name,btnEl){
  document.getElementById('pane-guide').style.display=name==='guide'?'block':'none';
  document.getElementById('pane-detail').style.display=name==='detail'?'block':'none';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  (btnEl||document.getElementById('tab-'+name)).classList.add('on');
}

// ─── lens ───
function setLens(btn){
  currentLens=btn.getAttribute('data-lens');
  document.querySelectorAll('.lens-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

// ─── timeline ───
document.getElementById('tslider').addEventListener('input',e=>{
  currentTimeISO=sliderToISO(Number(e.target.value));
  render();
});

// ─── DSL parser ───
function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,8); }
function nowISO(){ return new Date().toISOString(); }
function parseList(s){ if(!s)return[]; return s.split(',').map(x=>x.trim()).filter(Boolean); }

function execDSL(){
  const raw=document.getElementById('dsl-in').value.trim();
  const lines=raw.split('\n').map(x=>x.trim()).filter(Boolean);
  const log=document.getElementById('c-log');
  const msgs=[];
  try{
    for(const line of lines){
      if(line.startsWith('+CLAIM(')){
        const m=line.match(/^\+CLAIM\(\s*(\S+?)\s*,\s*["'`](.+?)["'`](?:\s*,\s*tags=\[([^\]]*)\])?\s*\)$/);
        if(!m) throw new Error('CLAIM 格式有误: '+line);
        const eId=m[1], stmt=m[2], tags=parseList(m[3]||'');
        let ent=M.entities.find(e=>e.id===eId);
        if(!ent) {
            ent = {id: eId, label: eId, type: "auto-generated", tags: [], observed_at: nowISO().slice(0,10), superseded_at: null, x: 400, y: 225};
            M.entities.push(ent);
        }
        const px=ent.x+(Math.random()*80-40), py=ent.y-120;
        const nc={id:uid('clm'),entity_ids:[eId],statement:stmt,epistemic_state:'proposed',
                  tags:[...tags],confidence:0.5,author:'ai',
                  observed_at:nowISO().slice(0,10),superseded_at:null,x:px,y:py};
        M.claims.push(nc);
        M.relations.push({from:eId,to:nc.id,type:'has_claim'});
        M.change_log.push({id:uid('chg'),time:nowISO(),author:'ai',summary:`Added ${nc.id}`});
        currentTimeISO=latest(); document.getElementById('tslider').value=100;
        msgs.push('✅ Added: '+nc.id);
        continue;
      }
      if(line.startsWith('>SUPERSEDE(')){
        const m=line.match(/^>SUPERSEDE\(\s*(\S+?)\s*,\s*(\S+?)\s*,\s*["'`](.+?)["'`]\s*\)$/);
        if(!m) throw new Error('SUPERSEDE 格式有误: '+line);
        const oldC=M.claims.find(c=>c.id===m[1]);
        const newC=M.claims.find(c=>c.id===m[2]);
        if(!oldC) throw new Error('旧 Claim 不存在: '+m[1]);
        if(!newC) throw new Error('新 Claim 不存在: '+m[2]);
        oldC.epistemic_state='superseded';
        oldC.superseded_at=nowISO().slice(0,10);
        newC.conflicting_with=[...(newC.conflicting_with||[]),m[1]];
        M.change_log.push({id:uid('chg'),time:nowISO(),author:'ai',summary:`Superseded ${m[1]} -> ${m[2]}: ${m[3]}`});
        msgs.push('✅ Superseded: '+m[1]+' → '+m[2]);
        continue;
      }
      throw new Error('未知指令: '+line);
    }
    M.meta.last_updated_at=nowISO();
    log.className='ok';
    log.textContent=msgs.join(' | ')||'✅ 执行完成';
    render();
  }catch(err){
    log.className='er';
    log.textContent='❌ '+err.message;
  }
}

function clearConsole(){
  document.getElementById('dsl-in').value='';
  const log=document.getElementById('c-log');
  log.className='';log.textContent='';
}

// ─── generate prompt for AI ───
function openPromptModal(){
  const anchors=(M.anchors||[]).filter(a=>visibleAt(a,currentTimeISO));
  const claims=M.claims.filter(c=>visible(c));
  const entities=M.entities.filter(e=>visible(e));
  const lensName=M.lenses.find(l=>l.id===currentLens)?.id||'all';

  const md=[
    '# CodeCart Context',
    `**Lens:** ${lensName} | **Time:** ${currentTimeISO.slice(0,10)} | **Version:** ${M.meta.version}`,
    '',
    '## Hard Constraints (DO NOT VIOLATE)',
    ...(anchors.length?anchors.map(a=>'- '+a.statement):['- None']),
    '',
    '## Active Claims',
    ...(claims.length?claims.map(c=>`- [${c.id}] [${c.epistemic_state}] ${c.statement}`):['- None']),
    '',
    '## Entities',
    ...(entities.length?entities.map(e=>`- [${e.id}] ${e.label} (${e.type})`):['- None']),
    '',
    '---',
    '**Instruction:** Reply ONLY with DSL commands. Examples:',
    '+CLAIM(entity_id, "statement text", tags=[tag1,tag2])',
    '>SUPERSEDE(old_claim_id, new_claim_id, "reason")',
    'No JSON. No explanations.',
  ].join('\n');

  document.getElementById('m-ta').value=md;
  document.getElementById('m-title').textContent=t('mTitle');
  document.getElementById('m-desc').textContent=t('mDesc');
  document.getElementById('m-copy').textContent=t('mCopy');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

function copyPrompt(){
  const ta=document.getElementById('m-ta');
  navigator.clipboard.writeText(ta.value).then(()=>{
    const btn=document.getElementById('m-copy');
    const orig=btn.textContent;
    btn.textContent=lang==='zh'?'✅ 已复制！':'✅ Copied!';
    setTimeout(()=>{btn.textContent=orig;},2000);
  }).catch(()=>{
    ta.select();document.execCommand('copy');
  });
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─── save cartridge (Custom Path & Name) ───
async function saveCartridge(){
  const content=JSON.stringify(M,null,2);
  const defName='CodeCart_'+M.meta.name.replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.json';
  if('showSaveFilePicker' in window){
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:defName,
        types:[{description:'JSON File',accept:{'application/json':['.json']}}]
      });
      const writable=await handle.createWritable();
      await writable.write(content);
      await writable.close();
    }catch(err){
      console.log('Save cancelled');
    }
  }else{
    const blob=new Blob([content],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=defName;
    a.click();
  }
}
